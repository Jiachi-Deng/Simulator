name: OpenDesign RC Acceptance Evidence

on:
  workflow_dispatch:
    inputs:
      machine_run_id:
        description: Successful OpenDesign M1 Machine Evidence Producer run ID from this exact main commit.
        required: true
        type: string
      visual_run_id:
        description: Successful OpenDesign M1 Visual Attestation Producer run ID bound to the machine run.
        required: true
        type: string
      acceptance_approved:
        description: Product-owner approval to notarize the already sealed machine and visual producer runs.
        required: true
        default: false
        type: boolean
      acceptance_confirmation:
        description: Enter NOTARIZE_OPEN_DESIGN_M1_MACHINE_AND_VISUAL_RUNS.
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: open-design-rc-acceptance-evidence
  cancel-in-progress: false

jobs:
  notarize-acceptance-evidence:
    name: Validate and notarize sanitized acceptance evidence
    if: >-
      github.repository == 'Jiachi-Deng/Simulator' &&
      github.ref == 'refs/heads/main' &&
      vars.OPEN_DESIGN_RC_ACCEPTANCE_ENABLED == 'true' &&
      inputs.acceptance_approved == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: open-design-rc-acceptance
    env:
      RELEASE_OWNER: Jiachi-Deng
      RELEASE_REPOSITORY: Simulator
      HOST_HEAD_SHA: ${{ github.sha }}
      HOST_VERSION: 0.12.0
      HOST_ARTIFACT_NAME: Simulator-arm64.dmg
      RC_SOURCE_SHA: 6b39a9bcc0f158645897976e23f334c5cab771f4
      RC_TAG: open-design-v0.14.6-rc.1
      RC_VERSION: 0.14.6-rc.1
      RC_ARCHIVE_ASSET: org.simulator.open-design-0.14.6-rc.1-darwin-arm64.tar.gz
      RC_CATALOG_ASSET: org.simulator.open-design-0.14.6-rc.1-catalog-v2.json
      RC_ENVELOPE_ASSET: org.simulator.open-design-0.14.6-rc.1-catalog-v2-envelope.json
      RC_METADATA_ASSET: org.simulator.open-design-0.14.6-rc.1-release-metadata.json
      LKG_TAG: open-design-v0.14.5
      LKG_VERSION: 0.14.5
      LKG_ARCHIVE_ASSET: org.simulator.open-design-0.14.5-darwin-arm64.tar.gz
      LKG_CATALOG_ASSET: org.simulator.open-design-0.14.5-catalog-v2.json
      LKG_ENVELOPE_ASSET: org.simulator.open-design-0.14.5-catalog-v2-envelope.json
      LKG_CONFIG_ASSET: open-design-official-channel.json
      LKG_METADATA_ASSET: org.simulator.open-design-0.14.5-release-metadata.json
      SOURCE_AUTHORITY_CONFIG: apps/electron/resources/open-design-official-channel.json
      MACHINE_RUN_ID: ${{ inputs.machine_run_id }}
      VISUAL_RUN_ID: ${{ inputs.visual_run_id }}
      MACHINE_WORKFLOW_PATH: .github/workflows/open-design-m1-machine-evidence.yml
      VISUAL_WORKFLOW_PATH: .github/workflows/open-design-m1-visual-attestation.yml
      MACHINE_ARTIFACT_NAME: open-design-m1-machine-evidence
      VISUAL_ARTIFACT_NAME: open-design-m1-visual-attestation
      ACCEPTANCE_CONFIRMATION: ${{ inputs.acceptance_confirmation }}

    steps:
      - name: Checkout exact Host authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: modules/open-design/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install exact verification dependencies
        run: |
          bun install --frozen-lockfile --ignore-scripts
          npm ci --ignore-scripts --prefix modules/open-design

      - name: Validate fixed dual-source authority
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "$HOST_HEAD_SHA"
          test "$HOST_VERSION" = "0.12.0"
          test "$HOST_ARTIFACT_NAME" = "Simulator-arm64.dmg"
          [[ "$HOST_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RC_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$ACCEPTANCE_CONFIRMATION" = "NOTARIZE_OPEN_DESIGN_M1_MACHINE_AND_VISUAL_RUNS"

          git fetch --no-tags origin "+refs/tags/$RC_TAG:refs/tags/$RC_TAG"
          test "$(git rev-parse "refs/tags/$RC_TAG^{commit}")" = "$RC_SOURCE_SHA"
          git merge-base --is-ancestor "$RC_SOURCE_SHA" "$HOST_HEAD_SHA"
          for authority_path in \
            scripts/qa/open-design-m1-cases.ts \
            scripts/qa/generate-open-design-m1-case-artifacts.ts; do
            test "$(git show "$RC_SOURCE_SHA:$authority_path" | shasum -a 256 | awk '{print $1}')" = \
              "$(shasum -a 256 "$authority_path" | awk '{print $1}')"
          done

          rc_state=$(gh release view "$RC_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,targetCommitish,assets)
          test "$(jq -r .tagName <<<"$rc_state")" = "$RC_TAG"
          test "$(jq -r .isDraft <<<"$rc_state")" = false
          test "$(jq -r .isPrerelease <<<"$rc_state")" = true
          test "$(jq -r .targetCommitish <<<"$rc_state")" = "$RC_SOURCE_SHA"

      - name: Authenticate exact producer runs and safely extract artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          [[ "$MACHINE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$VISUAL_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          test "$MACHINE_RUN_ID" != "$VISUAL_RUN_ID"
          test "$MACHINE_RUN_ID" != "$GITHUB_RUN_ID"
          test "$VISUAL_RUN_ID" != "$GITHUB_RUN_ID"
          test "$GITHUB_RUN_ATTEMPT" = 1

          machine_run=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$MACHINE_RUN_ID")
          visual_run=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$VISUAL_RUN_ID")
          final_run=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          for descriptor in \
            "$machine_run|$MACHINE_WORKFLOW_PATH" \
            "$visual_run|$VISUAL_WORKFLOW_PATH"; do
            run_json=${descriptor%|*}
            workflow_path=${descriptor##*|}
            test "$(jq -r .status <<<"$run_json")" = completed
            test "$(jq -r .conclusion <<<"$run_json")" = success
            test "$(jq -r .head_branch <<<"$run_json")" = main
            test "$(jq -r .head_sha <<<"$run_json")" = "$HOST_HEAD_SHA"
            test "$(jq -r .repository.full_name <<<"$run_json")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
            test "$(jq -r .path <<<"$run_json")" = "$workflow_path"
            test "$(jq -r .event <<<"$run_json")" = workflow_dispatch
            test "$(jq -r .run_attempt <<<"$run_json")" = 1
          done
          test "$(jq -r .head_sha <<<"$final_run")" = "$HOST_HEAD_SHA"
          test "$(jq -r .repository.full_name <<<"$final_run")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$(jq -r .path <<<"$final_run")" = ".github/workflows/open-design-rc-acceptance.yml"
          test "$(jq -r .event <<<"$final_run")" = workflow_dispatch
          test "$(jq -r .run_attempt <<<"$final_run")" = 1
          node -e '
            const values = process.argv.slice(1).map(Date.parse);
            if (values.some((value) => !Number.isFinite(value))
              || !(values[0] < values[1] && values[1] <= values[2] && values[2] < values[3])) process.exit(1);
          ' \
            "$(jq -er .updated_at <<<"$machine_run")" \
            "$(jq -er .created_at <<<"$visual_run")" \
            "$(jq -er .updated_at <<<"$visual_run")" \
            "$(jq -er .created_at <<<"$final_run")"

          machine_jobs=$(gh api \
            "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$MACHINE_RUN_ID/attempts/1/jobs?per_page=100")
          test "$(jq -r .total_count <<<"$machine_jobs")" = 1
          test "$(jq -r '.jobs[0].conclusion' <<<"$machine_jobs")" = success
          for required_label in self-hosted macOS ARM64 simulator-open-design-m1; do
            jq -e --arg label "$required_label" \
              '.jobs | length == 1 and (.jobs[0].labels | index($label) != null)' <<<"$machine_jobs" >/dev/null
          done

          root="$RUNNER_TEMP/open-design-rc-acceptance"
          machine_root="$root/machine"
          visual_root="$root/visual"
          mkdir -m 700 -p "$machine_root" "$visual_root"
          for spec in \
            "$MACHINE_RUN_ID|$MACHINE_ARTIFACT_NAME|$root/machine.zip" \
            "$VISUAL_RUN_ID|$VISUAL_ARTIFACT_NAME|$root/visual.zip"; do
            run_id=$(cut -d '|' -f 1 <<<"$spec")
            artifact_name=$(cut -d '|' -f 2 <<<"$spec")
            archive=$(cut -d '|' -f 3 <<<"$spec")
            artifacts=$(gh api \
              "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$run_id/artifacts?per_page=100")
            test "$(jq -r .total_count <<<"$artifacts")" = 1
            test "$(jq '[.artifacts[] | select(.expired == false)] | length' <<<"$artifacts")" = 1
            artifact=$(jq -ce --arg name "$artifact_name" \
              '.artifacts[] | select(.expired == false and .name == $name)' <<<"$artifacts")
            artifact_id=$(jq -er .id <<<"$artifact")
            [[ "$artifact_id" =~ ^[1-9][0-9]*$ ]]
            test "$(jq -r .workflow_run.id <<<"$artifact")" = "$run_id"
            gh api -H "Accept: application/vnd.github+json" \
              "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$archive"
            test -s "$archive"
            test "$(wc -c < "$archive" | tr -d ' ')" -le 104857600
          done

          python3 - "$root/machine.zip" "$machine_root" "$root/visual.zip" "$visual_root" <<'PY'
          import os
          import stat
          import sys
          import zipfile
          from pathlib import PurePosixPath

          machine_zip, machine_root, visual_zip, visual_root = sys.argv[1:]

          def machine_limit(path):
              if path == "machine-manifest.json": return 64 * 1024
              if path == "required-ci.json": return 256 * 1024
              if path == "SHA256SUMS": return 64 * 1024
              if path.startswith("records/"): return 384 * 1024
              if path.startswith("events/"): return 256 * 1024
              if path.startswith("workspace/"): return 64 * 1024
              if path.startswith("previews/"): return 4 * 1024 * 1024
              if path.startswith("rollback/") or path.startswith("trust/"): return 256 * 1024
              raise ValueError("unexpected machine artifact path")

          def visual_limit(path):
              if path == "visual-attestation.json": return 64 * 1024
              if path == "SHA256SUMS": return 256
              raise ValueError("unexpected visual artifact path")

          def extract(archive, root, expected_files, maximum_total, limit_for,
                      maximum_members, maximum_directories):
              seen = set()
              total = 0
              files = 0
              members = 0
              directories = 0
              maximum_path_bytes = 512
              maximum_path_depth = 8
              with zipfile.ZipFile(archive) as source:
                  for info in source.infolist():
                      name = info.filename
                      raw = name[:-1] if name.endswith("/") else name
                      parts = raw.split("/")
                      path = PurePosixPath(raw)
                      if (not raw or "\\" in name or "\x00" in name or name.startswith("/")
                              or len(raw.encode("utf-8")) > maximum_path_bytes
                              or len(parts) > maximum_path_depth
                              or any(part in ("", ".", "..") for part in parts) or raw in seen):
                          raise ValueError("unsafe or duplicate artifact path")
                      seen.add(raw)
                      members += 1
                      if members > maximum_members:
                          raise ValueError("artifact contains too many members")
                      mode = info.external_attr >> 16
                      kind = stat.S_IFMT(mode)
                      if stat.S_ISLNK(mode) or kind not in (0, stat.S_IFREG, stat.S_IFDIR):
                          raise ValueError("non-regular artifact member")
                      if info.flag_bits & 1:
                          raise ValueError("encrypted artifact member")
                      if info.compress_type not in (zipfile.ZIP_STORED, zipfile.ZIP_DEFLATED):
                          raise ValueError("unsupported artifact compression")
                      destination = os.path.join(root, *path.parts)
                      if info.is_dir():
                          directories += 1
                          if directories > maximum_directories:
                              raise ValueError("artifact contains too many directories")
                          os.makedirs(destination, mode=0o700, exist_ok=True)
                          continue
                      limit = limit_for(name)
                      if info.file_size < 1 or info.file_size > limit:
                          raise ValueError("artifact member exceeds limit")
                      total += info.file_size
                      files += 1
                      if total > maximum_total or files > expected_files:
                          raise ValueError("artifact exceeds fixed closure")
                      os.makedirs(os.path.dirname(destination), mode=0o700, exist_ok=True)
                      written = 0
                      with source.open(info) as reader, open(destination, "xb") as writer:
                          while chunk := reader.read(1024 * 1024):
                              written += len(chunk)
                              if written > info.file_size or written > limit:
                                  raise ValueError("artifact member expands beyond declared limit")
                              writer.write(chunk)
                      if written != info.file_size or os.path.getsize(destination) != info.file_size:
                          raise ValueError("artifact member changed during extraction")
                      os.chmod(destination, 0o600)
              if files != expected_files:
                  raise ValueError("artifact file count mismatch")

          extract(machine_zip, machine_root, 150, 96 * 1024 * 1024, machine_limit, 182, 32)
          extract(visual_zip, visual_root, 2, 128 * 1024, visual_limit, 6, 4)
          PY

          printf 'ACCEPTANCE_ROOT=%s\nMACHINE_ROOT=%s\nVISUAL_ROOT=%s\n' \
            "$root" "$machine_root" "$visual_root" >> "$GITHUB_ENV"
          printf 'MACHINE_COMPLETED_AT=%s\nVISUAL_CREATED_AT=%s\nVISUAL_COMPLETED_AT=%s\nFINAL_CREATED_AT=%s\n' \
            "$(jq -er .updated_at <<<"$machine_run")" \
            "$(jq -er .created_at <<<"$visual_run")" \
            "$(jq -er .updated_at <<<"$visual_run")" \
            "$(jq -er .created_at <<<"$final_run")" >> "$GITHUB_ENV"

      - name: Authenticate Required CI and exact Host artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          manifest="$MACHINE_ROOT/machine-manifest.json"
          required_ci="$MACHINE_ROOT/required-ci.json"
          batch_started_at=$(jq -er .batch.startedAt "$manifest")

          completed_before_batch() {
            node -e '
              const completed = Date.parse(process.argv[1]);
              const started = Date.parse(process.argv[2]);
              if (!Number.isFinite(completed) || !Number.isFinite(started) || completed > started) process.exit(1);
            ' "$1" "$batch_started_at"
          }

          while IFS= read -r descriptor; do
            run_id=$(jq -er .runId <<<"$descriptor")
            workflow_path=$(jq -er .workflowPath <<<"$descriptor")
            run_attempt=$(jq -er .runAttempt <<<"$descriptor")
            [[ "$run_id" =~ ^[1-9][0-9]*$ ]]
            [[ "$run_attempt" =~ ^[1-9][0-9]*$ ]]
            run_json=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$run_id")
            test "$(jq -r .conclusion <<<"$run_json")" = success
            test "$(jq -r .head_branch <<<"$run_json")" = main
            test "$(jq -r .head_sha <<<"$run_json")" = "$HOST_HEAD_SHA"
            test "$(jq -r .repository.full_name <<<"$run_json")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
            test "$(jq -r .path <<<"$run_json")" = "$workflow_path"
            test "$(jq -r .run_attempt <<<"$run_json")" = "$run_attempt"
            case "$(jq -r .event <<<"$run_json")" in
              push|workflow_dispatch) ;;
              *) exit 1 ;;
            esac
            completed_before_batch "$(jq -er .updated_at <<<"$run_json")"
          done < <(jq -ce '.runs[]' "$required_ci")

          host_build_run_id=$(jq -er .host.buildRunId "$manifest")
          expected_host_sha=$(jq -er .host.artifactSha256 "$manifest")
          [[ "$host_build_run_id" =~ ^[1-9][0-9]*$ ]]
          [[ "$expected_host_sha" =~ ^[0-9a-f]{64}$ ]]
          host_run=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$host_build_run_id")
          test "$(jq -r .conclusion <<<"$host_run")" = success
          test "$(jq -r .head_branch <<<"$host_run")" = main
          test "$(jq -r .head_sha <<<"$host_run")" = "$HOST_HEAD_SHA"
          test "$(jq -r .repository.full_name <<<"$host_run")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$(jq -r .path <<<"$host_run")" = ".github/workflows/engineering-rc.yml"
          test "$(jq -r .event <<<"$host_run")" = workflow_dispatch
          test "$(jq -r .run_attempt <<<"$host_run")" = 1
          completed_before_batch "$(jq -er .updated_at <<<"$host_run")"

          artifacts=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$host_build_run_id/artifacts?per_page=100")
          artifact_count=$(jq '[.artifacts[] | select(.expired == false and (.name | test("^simulator-0\\.12\\.0-rc\\.[1-9][0-9]*-macos-arm64-unsigned$")))] | length' <<<"$artifacts")
          test "$artifact_count" = 1
          artifact=$(jq -ce '.artifacts[] | select(.expired == false and (.name | test("^simulator-0\\.12\\.0-rc\\.[1-9][0-9]*-macos-arm64-unsigned$")))' <<<"$artifacts")
          artifact_id=$(jq -er .id <<<"$artifact")
          artifact_size=$(jq -er .size_in_bytes <<<"$artifact")
          [[ "$artifact_id" =~ ^[1-9][0-9]*$ ]]
          [[ "$artifact_size" =~ ^[1-9][0-9]*$ ]]
          test "$artifact_size" -le 2147483648
          test "$(jq -r .workflow_run.id <<<"$artifact")" = "$host_build_run_id"

          host_download="$ACCEPTANCE_ROOT/host-artifact"
          host_archive="$ACCEPTANCE_ROOT/host-artifact.zip"
          mkdir -m 700 "$host_download"
          gh api -H "Accept: application/vnd.github+json" \
            "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/artifacts/$artifact_id/zip" > "$host_archive"
          test -s "$host_archive"
          test "$(wc -c < "$host_archive" | tr -d ' ')" -le 2147483648

          python3 - "$host_archive" "$host_download" <<'PY'
          import hashlib
          import os
          import re
          import stat
          import sys
          import zipfile

          archive, root = sys.argv[1:]
          expected_files = {
              "RELEASE_NOTES.md",
              "SHA256SUMS",
              "Simulator-arm64.dmg",
              "Simulator-arm64.zip",
              "app-inventory.jsonl",
              "attestations/provenance.sigstore.json",
              "attestations/sbom.sigstore.json",
              "bundle-metadata.json",
              "dmg-app-inventory.raw.jsonl",
              "dmg-signatures.json",
              "package-verification-code.txt",
              "packaged-files.sha256",
              "rc-validation.json",
              "sbom.spdx.json",
              "transport-normalization-policy.json",
              "verification-input.json",
              "zip-app-inventory.raw.jsonl",
              "zip-signatures.json",
          }
          expected_directories = {"attestations"}
          maximum_total = 3 * 1024 * 1024 * 1024
          maximum_members = 19
          maximum_directories = 1
          maximum_path_bytes = 512
          maximum_path_depth = 8

          def maximum_for(path):
              if path in {"Simulator-arm64.dmg", "Simulator-arm64.zip"}:
                  return 1280 * 1024 * 1024
              if path in {"app-inventory.jsonl", "dmg-app-inventory.raw.jsonl", "zip-app-inventory.raw.jsonl"}:
                  return 256 * 1024 * 1024
              if path == "sbom.spdx.json":
                  return 128 * 1024 * 1024
              if path == "SHA256SUMS":
                  return 64 * 1024
              return 32 * 1024 * 1024

          seen = set()
          extracted = set()
          total = 0
          members = 0
          directories = 0
          with zipfile.ZipFile(archive) as source:
              for info in source.infolist():
                  name = info.filename
                  raw = name[:-1] if name.endswith("/") else name
                  parts = raw.split("/")
                  if (not raw or "\\" in name or "\x00" in name or name.startswith("/")
                          or len(raw.encode("utf-8")) > maximum_path_bytes
                          or len(parts) > maximum_path_depth
                          or any(part in ("", ".", "..") for part in parts) or raw in seen):
                      raise ValueError("unsafe or duplicate Host artifact path")
                  seen.add(raw)
                  members += 1
                  if members > maximum_members:
                      raise ValueError("Host artifact contains too many members")
                  mode = info.external_attr >> 16
                  kind = stat.S_IFMT(mode)
                  if stat.S_ISLNK(mode) or kind not in (0, stat.S_IFREG, stat.S_IFDIR):
                      raise ValueError("non-regular Host artifact member")
                  if info.flag_bits & 1:
                      raise ValueError("encrypted Host artifact member")
                  if info.compress_type not in (zipfile.ZIP_STORED, zipfile.ZIP_DEFLATED):
                      raise ValueError("unsupported Host artifact compression")
                  destination = os.path.join(root, *parts)
                  if info.is_dir():
                      directories += 1
                      if directories > maximum_directories or raw not in expected_directories:
                          raise ValueError("unexpected Host artifact directory")
                      os.makedirs(destination, mode=0o700, exist_ok=True)
                      continue
                  if raw not in expected_files:
                      raise ValueError("unexpected Host artifact file")
                  limit = maximum_for(raw)
                  if info.file_size < 1 or info.file_size > limit:
                      raise ValueError("Host artifact member exceeds limit")
                  total += info.file_size
                  if total > maximum_total:
                      raise ValueError("Host artifact exceeds total limit")
                  os.makedirs(os.path.dirname(destination), mode=0o700, exist_ok=True)
                  written = 0
                  with source.open(info) as reader, open(destination, "xb") as writer:
                      while chunk := reader.read(1024 * 1024):
                          written += len(chunk)
                          if written > info.file_size or written > limit:
                              raise ValueError("Host artifact expands beyond declared limit")
                          writer.write(chunk)
                  if written != info.file_size or os.path.getsize(destination) != info.file_size:
                      raise ValueError("Host artifact member changed during extraction")
                  os.chmod(destination, 0o600)
                  extracted.add(raw)

          if extracted != expected_files or not seen.issubset(expected_files | expected_directories):
              raise ValueError("Host artifact does not match the exact 18-file Engineering RC closure")

          sums_path = os.path.join(root, "SHA256SUMS")
          with open(sums_path, "r", encoding="utf-8", newline="") as handle:
              sums_source = handle.read()
          if not sums_source.endswith("\n"):
              raise ValueError("Host SHA256SUMS is not canonical")
          expected_sums = sorted(expected_files - {"SHA256SUMS"})
          lines = sums_source[:-1].split("\n")
          if len(lines) != 17 or len(lines) != len(expected_sums):
              raise ValueError("Host SHA256SUMS count is invalid")
          for line, expected_path in zip(lines, expected_sums):
              match = re.fullmatch(r"([0-9a-f]{64})  ([A-Za-z0-9][A-Za-z0-9._/-]*)", line)
              if not match or match.group(2) != expected_path:
                  raise ValueError("Host SHA256SUMS order or path is invalid")
              digest = hashlib.sha256()
              with open(os.path.join(root, expected_path), "rb") as handle:
                  while chunk := handle.read(1024 * 1024):
                      digest.update(chunk)
              if digest.hexdigest() != match.group(1):
                  raise ValueError("Host artifact checksum mismatch")
          PY

          test "$(find "$host_download" -type f | wc -l | tr -d ' ')" = 18
          test "$(find "$host_download" -type l | wc -l | tr -d ' ')" = 0
          host_artifact_sha=$(shasum -a 256 "$host_download/$HOST_ARTIFACT_NAME" | awk '{print $1}')
          test "$host_artifact_sha" = "$expected_host_sha"
          printf 'HOST_BUILD_RUN_ID=%s\nHOST_ARTIFACT_SHA256=%s\n' \
            "$host_build_run_id" "$host_artifact_sha" >> "$GITHUB_ENV"

      - name: Authenticate RC, LKG, and signed Catalog closure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          release_root="$ACCEPTANCE_ROOT/releases"
          lkg="$release_root/lkg"
          rc="$release_root/rc"
          rc_verify="$release_root/rc-verify"
          verify_output="$release_root/verify-output"
          mkdir -m 700 -p "$lkg" "$rc" "$rc_verify" "$verify_output"

          lkg_state=$(gh release view "$LKG_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,assets)
          test "$(jq -r .tagName <<<"$lkg_state")" = "$LKG_TAG"
          test "$(jq -r .isDraft <<<"$lkg_state")" = false
          test "$(jq -r .isPrerelease <<<"$lkg_state")" = false
          expected_lkg=$(printf '%s\n' \
            "$LKG_ARCHIVE_ASSET" "$LKG_CATALOG_ASSET" "$LKG_ENVELOPE_ASSET" \
            "$LKG_CONFIG_ASSET" "$LKG_METADATA_ASSET" | LC_ALL=C sort)
          test "$(jq -r '.assets[].name' <<<"$lkg_state" | LC_ALL=C sort)" = "$expected_lkg"

          rc_state=$(gh release view "$RC_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,targetCommitish,assets)
          test "$(jq -r .tagName <<<"$rc_state")" = "$RC_TAG"
          test "$(jq -r .isDraft <<<"$rc_state")" = false
          test "$(jq -r .isPrerelease <<<"$rc_state")" = true
          test "$(jq -r .targetCommitish <<<"$rc_state")" = "$RC_SOURCE_SHA"
          expected_rc=$(printf '%s\n' \
            "$RC_ARCHIVE_ASSET" "$RC_CATALOG_ASSET" "$RC_ENVELOPE_ASSET" "$RC_METADATA_ASSET" | LC_ALL=C sort)
          test "$(jq -r '.assets[].name' <<<"$rc_state" | LC_ALL=C sort)" = "$expected_rc"

          gh release download "$LKG_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --dir "$lkg"
          gh release download "$RC_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --dir "$rc"
          test "$(find "$lkg" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 5
          test "$(find "$rc" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 4
          for asset in "$LKG_ARCHIVE_ASSET" "$LKG_CATALOG_ASSET" "$LKG_ENVELOPE_ASSET" "$LKG_CONFIG_ASSET" "$LKG_METADATA_ASSET"; do
            test -f "$lkg/$asset"
            chmod 600 "$lkg/$asset"
          done
          test -f "$SOURCE_AUTHORITY_CONFIG"
          for asset in "$RC_ARCHIVE_ASSET" "$RC_CATALOG_ASSET" "$RC_ENVELOPE_ASSET" "$RC_METADATA_ASSET"; do
            test -f "$rc/$asset"
            cp "$rc/$asset" "$rc_verify/$asset"
            chmod 600 "$rc/$asset" "$rc_verify/$asset"
          done

          SOURCE_AUTHORITY_CONFIG="$SOURCE_AUTHORITY_CONFIG" LKG_AUTHORITY_CONFIG="$lkg/$LKG_CONFIG_ASSET" \
            RC_VERIFY_BUNDLE="$rc_verify" \
            PUBLIC_KEY_FILE="$release_root/release-public.pem" KEY_METADATA_FILE="$release_root/trusted-key.json" \
            node --input-type=module <<'NODE'
          import { createPublicKey } from "node:crypto";
          import { readFileSync, writeFileSync } from "node:fs";
          import { join } from "node:path";
          import { encodeCanonicalCatalog } from "@simulator/module-release-trust";
          const exactKeys = (value, expected, label) => {
            if (value === null || typeof value !== "object" || Array.isArray(value)) throw new Error(`${label} must be an object`);
            const actual = Object.keys(value).sort();
            const wanted = [...expected].sort();
            if (actual.length !== wanted.length || actual.some((key, index) => key !== wanted[index])) {
              throw new Error(`${label} fields differ`);
            }
          };
          const readAuthority = (path, identity, label) => {
            const value = JSON.parse(readFileSync(path, "utf8"));
            exactKeys(value, ["schemaVersion", "moduleId", "version", "platform", "catalogUrl", "githubRelease", "trustedKeys"], label);
            exactKeys(value.githubRelease, ["owner", "repository", "tag"], `${label} GitHub release`);
            if (value.schemaVersion !== 1 || value.moduleId !== "org.simulator.open-design" || value.platform !== "darwin-arm64"
                || value.version !== identity.version || value.catalogUrl !== identity.catalogUrl
                || value.githubRelease.owner !== "Jiachi-Deng" || value.githubRelease.repository !== "Simulator"
                || value.githubRelease.tag !== identity.tag || !Array.isArray(value.trustedKeys) || value.trustedKeys.length !== 1) {
              throw new Error(`${label} identity differs`);
            }
            exactKeys(value.trustedKeys[0], ["activeFrom", "activeUntil", "keyId", "publicKey"], `${label} trust root`);
            return value;
          };
          const sourceAuthority = readAuthority(process.env.SOURCE_AUTHORITY_CONFIG, {
            version: "0.14.6",
            tag: "open-design-v0.14.6",
            catalogUrl: "https://github.com/Jiachi-Deng/Simulator/releases/download/open-design-v0.14.6/org.simulator.open-design-0.14.6-catalog-v2-envelope.json",
          }, "future stable authority");
          const lkgAuthority = readAuthority(process.env.LKG_AUTHORITY_CONFIG, {
            version: "0.14.5",
            tag: "open-design-v0.14.5",
            catalogUrl: "https://github.com/Jiachi-Deng/Simulator/releases/download/open-design-v0.14.5/org.simulator.open-design-0.14.5-catalog-v2-envelope.json",
          }, "LKG authority");
          const trusted = lkgAuthority.trustedKeys[0];
          for (const field of ["activeFrom", "activeUntil", "keyId", "publicKey"]) {
            if (sourceAuthority.trustedKeys[0][field] !== trusted[field]) throw new Error("Future stable and LKG trust roots differ");
          }
          if (trusted?.keyId !== "open-design-release-2026-01" ||
              typeof trusted?.publicKey !== "string" ||
              typeof trusted?.activeFrom !== "string" ||
              typeof trusted?.activeUntil !== "string") {
            throw new Error("Stable release key authority is invalid");
          }
          const raw = Buffer.from(trusted.publicKey, "base64");
          if (raw.length !== 32 || raw.toString("base64") !== trusted.publicKey) {
            throw new Error("Stable Ed25519 public key is non-canonical");
          }
          const publicKey = createPublicKey({
            key: { kty: "OKP", crv: "Ed25519", x: raw.toString("base64url") },
            format: "jwk",
          }).export({ type: "spki", format: "pem" });
          writeFileSync(process.env.PUBLIC_KEY_FILE, publicKey, { mode: 0o600, flag: "wx" });
          const rc = {
            schemaVersion: 1,
            moduleId: "org.simulator.open-design",
            version: "0.14.6-rc.1",
            platform: "darwin-arm64",
            catalogUrl: "https://github.com/Jiachi-Deng/Simulator/releases/download/open-design-v0.14.6-rc.1/org.simulator.open-design-0.14.6-rc.1-catalog-v2-envelope.json",
            githubRelease: { owner: "Jiachi-Deng", repository: "Simulator", tag: "open-design-v0.14.6-rc.1" },
            trustedKeys: [trusted],
          };
          writeFileSync(join(process.env.RC_VERIFY_BUNDLE, "open-design-official-channel.json"),
            encodeCanonicalCatalog(rc), { mode: 0o600, flag: "wx" });
          writeFileSync(process.env.KEY_METADATA_FILE,
            JSON.stringify({ keyId: trusted.keyId, activeFrom: trusted.activeFrom, activeUntil: trusted.activeUntil }),
            { mode: 0o600, flag: "wx" });
          NODE

          key_id=$(jq -er .keyId "$release_root/trusted-key.json")
          key_active_from=$(jq -er .activeFrom "$release_root/trusted-key.json")
          key_active_until=$(jq -er .activeUntil "$release_root/trusted-key.json")
          read_catalog_state() {
            node -e '
              const fs = require("node:fs");
              const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              const issuedAtMs = Date.parse(value.issuedAt);
              if (!Number.isSafeInteger(value.sequence) || value.sequence < 1 ||
                  !Number.isFinite(issuedAtMs) || new Date(issuedAtMs).toISOString() !== value.issuedAt) process.exit(1);
              process.stdout.write(JSON.stringify({ sequence: value.sequence, issuedAt: value.issuedAt, verificationTime: issuedAtMs + 1000 }));
            ' "$1"
          }

          lkg_catalog=$(read_catalog_state "$lkg/$LKG_CATALOG_ASSET")
          rc_catalog=$(read_catalog_state "$rc/$RC_CATALOG_ASSET")
          manifest="$MACHINE_ROOT/machine-manifest.json"
          test "$(jq -er .expiresAt "$lkg/$LKG_CATALOG_ASSET")" = "$(jq -er .lkg.expiresAt "$manifest")"
          test "$(jq -er .expiresAt "$rc/$RC_CATALOG_ASSET")" = "$(jq -er .rc.expiresAt "$manifest")"
          cmp "$lkg/$LKG_CATALOG_ASSET" "$MACHINE_ROOT/trust/lkg-catalog.json"
          cmp "$lkg/$LKG_ENVELOPE_ASSET" "$MACHINE_ROOT/trust/lkg-envelope.json"
          cmp "$rc/$RC_CATALOG_ASSET" "$MACHINE_ROOT/trust/rc-catalog.json"
          cmp "$rc/$RC_ENVELOPE_ASSET" "$MACHINE_ROOT/trust/rc-envelope.json"
          node modules/open-design/package/production-cli.mjs \
            --module-version "$LKG_VERSION" --verify --bundle-root "$lkg" --release-tag "$LKG_TAG" \
            --key-id "$key_id" --key-active-from "$key_active_from" --key-active-until "$key_active_until" \
            --public-key-file "$release_root/release-public.pem" --previous-sequence 0 \
            --verification-time "$(jq -r .verificationTime <<<"$lkg_catalog")" > "$verify_output/lkg.json"
          node modules/open-design/package/production-cli.mjs \
            --module-version "$RC_VERSION" --verify --bundle-root "$rc_verify" --release-tag "$RC_TAG" \
            --key-id "$key_id" --key-active-from "$key_active_from" --key-active-until "$key_active_until" \
            --public-key-file "$release_root/release-public.pem" \
            --previous-sequence "$(jq -r .sequence <<<"$lkg_catalog")" \
            --previous-issued-at "$(jq -r .issuedAt <<<"$lkg_catalog")" \
            --verification-time "$(jq -r .verificationTime <<<"$rc_catalog")" > "$verify_output/rc.json"

          jq -e \
            --argjson sequence "$(jq -er .lkg.catalogSequence "$manifest")" \
            --arg issuedAt "$(jq -er .lkg.catalogIssuedAt "$manifest")" \
            --arg archiveSha "$(jq -er .lkg.archiveSha256 "$manifest")" \
            --arg extractedSha "$(jq -er .lkg.extractedManifestSha256 "$manifest")" '
            .ok == true and .version == "0.14.5" and
            .catalogState.highestSequence == $sequence and .catalogState.latestIssuedAt == $issuedAt and
            .archiveSha256 == $archiveSha and .extractedManifestSha256 == $extractedSha
          ' "$verify_output/lkg.json" >/dev/null
          jq -e \
            --argjson sequence "$(jq -er .rc.catalogSequence "$manifest")" \
            --arg issuedAt "$(jq -er .rc.catalogIssuedAt "$manifest")" \
            --arg archiveSha "$(jq -er .rc.archiveSha256 "$manifest")" \
            --arg extractedSha "$(jq -er .rc.extractedManifestSha256 "$manifest")" '
            .ok == true and .version == "0.14.6-rc.1" and
            .catalogState.highestSequence == $sequence and .catalogState.latestIssuedAt == $issuedAt and
            .archiveSha256 == $archiveSha and .extractedManifestSha256 == $extractedSha
          ' "$verify_output/rc.json" >/dev/null
          test "$(shasum -a 256 "$rc/$RC_ARCHIVE_ASSET" | awk '{print $1}')" = \
            "$(jq -er .rc.archiveSha256 "$manifest")"
          test "$(shasum -a 256 "$lkg/$LKG_ARCHIVE_ASSET" | awk '{print $1}')" = \
            "$(jq -er .lkg.archiveSha256 "$manifest")"

          authority="$ACCEPTANCE_ROOT/final-authority.json"
          jq -cn \
            --arg finalCreatedAt "$FINAL_CREATED_AT" \
            --arg hostArtifactSha256 "$HOST_ARTIFACT_SHA256" \
            --argjson hostBuildRunId "$HOST_BUILD_RUN_ID" \
            --arg hostHeadSha "$HOST_HEAD_SHA" \
            --arg machineCompletedAt "$MACHINE_COMPLETED_AT" \
            --argjson machineRunId "$MACHINE_RUN_ID" \
            --arg visualCompletedAt "$VISUAL_COMPLETED_AT" \
            --arg visualCreatedAt "$VISUAL_CREATED_AT" \
            --argjson visualRunId "$VISUAL_RUN_ID" \
            --arg lkgArchiveSha "$(jq -er .archiveSha256 "$verify_output/lkg.json")" \
            --arg lkgCatalogIssuedAt "$(jq -er .catalogState.latestIssuedAt "$verify_output/lkg.json")" \
            --argjson lkgCatalogSequence "$(jq -er .catalogState.highestSequence "$verify_output/lkg.json")" \
            --arg lkgCatalogSha "$(shasum -a 256 "$lkg/$LKG_CATALOG_ASSET" | awk '{print $1}')" \
            --arg lkgEnvelopeSha "$(shasum -a 256 "$lkg/$LKG_ENVELOPE_ASSET" | awk '{print $1}')" \
            --arg lkgExpiresAt "$(jq -er .expiresAt "$lkg/$LKG_CATALOG_ASSET")" \
            --arg lkgExtractedSha "$(jq -er .extractedManifestSha256 "$verify_output/lkg.json")" \
            --arg rcArchiveSha "$(jq -er .archiveSha256 "$verify_output/rc.json")" \
            --arg rcCatalogIssuedAt "$(jq -er .catalogState.latestIssuedAt "$verify_output/rc.json")" \
            --argjson rcCatalogSequence "$(jq -er .catalogState.highestSequence "$verify_output/rc.json")" \
            --arg rcCatalogSha "$(shasum -a 256 "$rc/$RC_CATALOG_ASSET" | awk '{print $1}')" \
            --arg rcEnvelopeSha "$(shasum -a 256 "$rc/$RC_ENVELOPE_ASSET" | awk '{print $1}')" \
            --arg rcExpiresAt "$(jq -er .expiresAt "$rc/$RC_CATALOG_ASSET")" \
            --arg rcExtractedSha "$(jq -er .extractedManifestSha256 "$verify_output/rc.json")" \
            --arg rcSourceSha "$RC_SOURCE_SHA" '
            {
              finalCreatedAt: $finalCreatedAt,
              hostArtifactSha256: $hostArtifactSha256,
              hostBuildRunId: $hostBuildRunId,
              hostHeadSha: $hostHeadSha,
              lkg: {
                archiveSha256: $lkgArchiveSha,
                catalogIssuedAt: $lkgCatalogIssuedAt,
                catalogSequence: $lkgCatalogSequence,
                catalogSha256: $lkgCatalogSha,
                envelopeSha256: $lkgEnvelopeSha,
                expiresAt: $lkgExpiresAt,
                extractedManifestSha256: $lkgExtractedSha
              },
              machineCompletedAt: $machineCompletedAt,
              machineRunAttempt: 1,
              machineRunId: $machineRunId,
              rc: {
                archiveSha256: $rcArchiveSha,
                catalogIssuedAt: $rcCatalogIssuedAt,
                catalogSequence: $rcCatalogSequence,
                catalogSha256: $rcCatalogSha,
                envelopeSha256: $rcEnvelopeSha,
                expiresAt: $rcExpiresAt,
                extractedManifestSha256: $rcExtractedSha,
                sourceSha: $rcSourceSha
              },
              visualCompletedAt: $visualCompletedAt,
              visualCreatedAt: $visualCreatedAt,
              visualRunAttempt: 1,
              visualRunId: $visualRunId
            }
          ' > "$authority"
          chmod 600 "$authority"
          test "$(wc -c < "$authority" | tr -d ' ')" -le 16384
          printf 'FINAL_AUTHORITY=%s\n' "$authority" >> "$GITHUB_ENV"

      - name: Cross-bind producers and seal exact downstream evidence
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          output="$ACCEPTANCE_ROOT/output"
          test ! -e "$output"
          result=$(bun scripts/qa/open-design-m1-final-evidence.ts \
            --authority "$FINAL_AUTHORITY" \
            --machine-root "$MACHINE_ROOT" \
            --visual-root "$VISUAL_ROOT" \
            --output-root "$output")
          test "$(jq -er .artifactName <<<"$result")" = open-design-rc-acceptance-evidence
          test "$(jq -er .fileCount <<<"$result")" = 3
          test "$(find "$output" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 3
          test "$(find "$output" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')" = 3
          (
            cd "$output"
            test "$(wc -l < SHA256SUMS | tr -d ' ')" = 2
            shasum -a 256 -c SHA256SUMS
          )
          summary="$output/open-design-rc-acceptance-evidence.json"
          intake="$output/open-design-rc-acceptance-intake.json"
          test "$(jq -er .machineEvidence.runId "$summary")" = "$MACHINE_RUN_ID"
          test "$(jq -er .visualEvidence.runId "$summary")" = "$VISUAL_RUN_ID"
          test "$(jq -er .hostArtifactSha256 "$summary")" = "$HOST_ARTIFACT_SHA256"
          jq -e --slurpfile intake "$intake" '
            .machineEvidence == $intake[0].evidence.machineBatch and
            .visualEvidence == $intake[0].evidence.visualDecisions
          ' "$summary" >/dev/null
          printf 'ACCEPTANCE_OUTPUT=%s\n' "$output" >> "$GITHUB_ENV"

      - name: Upload immutable acceptance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: open-design-rc-acceptance-evidence
          path: ${{ env.ACCEPTANCE_OUTPUT }}/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: false

      - name: Record attestation boundary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          The fixed OpenDesign M1 evidence was structurally validated and bound to
          authenticated Required CI, Host artifact, RC tag, Release assets, and
          signed Catalog state. The exact sanitized intake, its digest, and both
          authenticated machine and visual producer artifact references were retained
          for downstream audit.
          This workflow did not run a model, spend a paid
          Turn, inspect private evidence, or make a human Preview decision.
          EOF
