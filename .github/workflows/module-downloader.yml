name: Module Downloader

on:
  pull_request:
    paths:
      - ".github/workflows/module-downloader.yml"
      - "bun.lock"
      - "package.json"
      - "packages/module-downloader/**"
      - "packages/module-release-trust/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/module-downloader.yml"
      - "bun.lock"
      - "package.json"
      - "packages/module-downloader/**"
      - "packages/module-release-trust/**"
  workflow_dispatch:

concurrency:
  group: module-downloader-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  module-downloader:
    name: Module Downloader (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run module downloader tests
        run: bun run test:module-downloader

      - name: Typecheck module downloader
        run: bun run typecheck:module-downloader

      - name: Build module downloader
        run: bun run build:module-downloader

  module-downloader-gate:
    name: Module Downloader Gate
    needs: module-downloader
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require all module downloader platforms
        env:
          MATRIX_RESULT: ${{ needs.module-downloader.result }}
        run: |
          if [[ "$MATRIX_RESULT" != "success" ]]; then
            echo "Module downloader matrix result: $MATRIX_RESULT"
            exit 1
          fi
