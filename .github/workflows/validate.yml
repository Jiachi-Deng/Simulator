name: Public Baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-and-smoke:
    name: Static and smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Reject Windows-illegal filenames
        run: |
          BAD=$(git ls-files | grep -E '[<>:"|?*]' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Files with characters illegal on Windows:"
            echo "$BAD"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate locale parity
        run: bun run lint:i18n:parity

      - name: Validate locale ordering
        run: bun run lint:i18n:sorted

      - name: Test LLM connections
        run: bun run test:shared:llm-connections

      - name: Smoke test document tools
        run: bun run test:doc-tools
