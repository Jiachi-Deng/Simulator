name: Public Baseline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Reject Windows-illegal filenames
        run: |
          BAD=$(git ls-files | grep -E '[<>:"|?*]' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Files with characters illegal on Windows:"
            echo "$BAD"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI validation
        run: bun run validate:ci

  build:
    name: Build all targets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron
        run: bun run electron:build

      - name: Build server
        run: bun run server:build

      - name: Build viewer
        run: bun run viewer:build

      - name: Build web UI
        run: bun run webui:build

  static-and-smoke:
    name: Static and smoke checks
    needs:
      - validation
      - build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require validation and build
        env:
          VALIDATION_RESULT: ${{ needs.validation.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [[ "$VALIDATION_RESULT" != "success" || "$BUILD_RESULT" != "success" ]]; then
            echo "Validation result: $VALIDATION_RESULT"
            echo "Build result: $BUILD_RESULT"
            exit 1
          fi
