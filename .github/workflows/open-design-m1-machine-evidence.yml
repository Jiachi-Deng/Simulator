name: OpenDesign M1 Machine Evidence

on:
  workflow_dispatch:
    inputs:
      host_build_run_id:
        description: Successful Engineering RC Bundle run ID for the exact main SHA.
        required: true
        type: string
      h1_connection_evidence_sha256:
        description: SHA-256 of the owner-only H1 Connection evidence for this exact Host authority.
        required: true
        type: string
      h1_a1_authority_sha256:
        description: SHA-256 identity of the immutable owner-only H1 to A1 authority.
        required: true
        type: string
      paid_turns_approved:
        description: Approve exactly 40 paid real-model Turns; the producer stops on the first failure.
        required: true
        default: false
        type: boolean
      acceptance_confirmation:
        description: Enter RUN_OPEN_DESIGN_M1_40_PAID_TURNS_STOP_ON_FIRST_FAILURE.
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: open-design-release-transaction
  cancel-in-progress: false

jobs:
  produce-machine-evidence:
    name: Produce sealed real OpenDesign machine evidence
    if: >-
      github.repository == 'Jiachi-Deng/Simulator' &&
      github.ref == 'refs/heads/main' &&
      github.run_attempt == 1 &&
      vars.OPEN_DESIGN_M1_MACHINE_EVIDENCE_ENABLED == 'true' &&
      vars.OPEN_DESIGN_RC_ACCEPTANCE_ENABLED == 'true' &&
      inputs.paid_turns_approved == true &&
      inputs.acceptance_confirmation == 'RUN_OPEN_DESIGN_M1_40_PAID_TURNS_STOP_ON_FIRST_FAILURE'
    runs-on: [self-hosted, macOS, ARM64, simulator-open-design-m1]
    timeout-minutes: 360
    environment:
      name: open-design-m1-machine-evidence
    env:
      GH_TOKEN: ${{ github.token }}
      HOST_BUILD_RUN_ID: ${{ inputs.host_build_run_id }}
      H1_CONNECTION_EVIDENCE_SHA256: ${{ inputs.h1_connection_evidence_sha256 }}
      H1_A1_AUTHORITY_SHA256: ${{ inputs.h1_a1_authority_sha256 }}
      PAID_TURNS_APPROVED: ${{ inputs.paid_turns_approved }}
      ACCEPTANCE_CONFIRMATION: ${{ inputs.acceptance_confirmation }}
      RC_ACCEPTANCE_FREEZE_ENABLED: ${{ vars.OPEN_DESIGN_RC_ACCEPTANCE_ENABLED }}
      SIMULATOR_M1_MACHINE_REAL: packaged-open-design-direct-observation

    steps:
      - name: Checkout exact main authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install exact producer dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify protected runner and exact Host build authority
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          test "$GITHUB_REPOSITORY" = "Jiachi-Deng/Simulator"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$PAID_TURNS_APPROVED" = "true"
          test "$ACCEPTANCE_CONFIRMATION" = "RUN_OPEN_DESIGN_M1_40_PAID_TURNS_STOP_ON_FIRST_FAILURE"
          test "$RC_ACCEPTANCE_FREEZE_ENABLED" = "true"
          test "$(uname -s)" = "Darwin"
          test "$(uname -m)" = "arm64"
          [[ "$HOST_BUILD_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$H1_CONNECTION_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$H1_A1_AUTHORITY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$GITHUB_SHA" = "$(git rev-parse refs/remotes/origin/main)"

          host_run=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$HOST_BUILD_RUN_ID")
          test "$(jq -r .conclusion <<<"$host_run")" = success
          test "$(jq -r .head_branch <<<"$host_run")" = main
          test "$(jq -r .head_sha <<<"$host_run")" = "$GITHUB_SHA"
          test "$(jq -r .repository.full_name <<<"$host_run")" = "$GITHUB_REPOSITORY"
          test "$(jq -r .path <<<"$host_run")" = ".github/workflows/engineering-rc.yml"
          test "$(jq -r .event <<<"$host_run")" = workflow_dispatch
          test "$(jq -r .run_attempt <<<"$host_run")" = "1"

          artifacts=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$HOST_BUILD_RUN_ID/artifacts?per_page=100")
          artifact_count=$(jq '[.artifacts[] | select(.expired == false and (.name | test("^simulator-0\\.12\\.0-rc\\.[1-9][0-9]*-macos-arm64-unsigned$")))] | length' <<<"$artifacts")
          test "$artifact_count" = "1"
          artifact=$(jq -ce '.artifacts[] | select(.expired == false and (.name | test("^simulator-0\\.12\\.0-rc\\.[1-9][0-9]*-macos-arm64-unsigned$")))' <<<"$artifacts")
          artifact_name=$(jq -er .name <<<"$artifact")
          artifact_id=$(jq -er .id <<<"$artifact")
          artifact_size=$(jq -er .size_in_bytes <<<"$artifact")
          artifact_digest=$(jq -er .digest <<<"$artifact")
          [[ "$artifact_id" =~ ^[1-9][0-9]*$ ]]
          [[ "$artifact_size" =~ ^[1-9][0-9]*$ ]]
          test "$artifact_size" -le 2147483648
          [[ "$artifact_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "$(jq -r .workflow_run.id <<<"$artifact")" = "$HOST_BUILD_RUN_ID"
          printf 'HOST_ARTIFACT_NAME=%s\n' "$artifact_name" >> "$GITHUB_ENV"
          printf 'HOST_ARTIFACT_ID=%s\n' "$artifact_id" >> "$GITHUB_ENV"
          printf 'HOST_ARTIFACT_DIGEST=%s\n' "$artifact_digest" >> "$GITHUB_ENV"

      - name: Claim exact owner-only H1 to A1 authority once
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          authority_parent="$HOME/Library/Application Support/Simulator M1 Release Evidence/h1-a1-authority/$GITHUB_SHA-run-$HOST_BUILD_RUN_ID"
          authority_root="$authority_parent/authority"
          claim_file="$authority_parent/claims/$H1_A1_AUTHORITY_SHA256/claim.json"
          claim_result="$RUNNER_TEMP/open-design-m1-h1-a1-claim-result.json"
          test -d "$authority_root"
          test ! -e "$claim_file"
          bun scripts/qa/open-design-m1-h1-a1-authority.ts claim \
            --authority-root "$authority_root" \
            --source-sha "$GITHUB_SHA" \
            --host-build-run-id "$HOST_BUILD_RUN_ID" \
            --host-artifact-id "$HOST_ARTIFACT_ID" \
            --host-artifact-name "$HOST_ARTIFACT_NAME" \
            --host-artifact-digest "$HOST_ARTIFACT_DIGEST" \
            --handoff-sha256 "$H1_A1_AUTHORITY_SHA256" \
            --connection-sha256 "$H1_CONNECTION_EVIDENCE_SHA256" \
            --producer-run-id "$GITHUB_RUN_ID" \
            --producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            > "$claim_result"
          chmod 600 "$claim_result"
          test "$(jq -er .claimFileRealpath "$claim_result")" = "$claim_file"
          test "$(jq -er .authoritySha256 "$claim_result")" = "$H1_A1_AUTHORITY_SHA256"
          test "$(jq -er .connectionSha256 "$claim_result")" = "$H1_CONNECTION_EVIDENCE_SHA256"
          test "$(jq -er .producerRunId "$claim_result")" = "$GITHUB_RUN_ID"
          test "$(jq -er .producerRunAttempt "$claim_result")" = "$GITHUB_RUN_ATTEMPT"
          printf 'M1_H1_A1_CLAIM_FILE=%s\n' "$claim_file" >> "$GITHUB_ENV"

      - name: Download and stage exact packaged Simulator
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          archive="$RUNNER_TEMP/open-design-m1-host-bundle.zip"
          host_bundle="$RUNNER_TEMP/open-design-m1-host-bundle"
          mount_root="$RUNNER_TEMP/open-design-m1-mount"
          packaged_root="$RUNNER_TEMP/open-design-m1-packaged"
          mkdir -m 700 "$host_bundle" "$mount_root" "$packaged_root"
          gh api -H "Accept: application/vnd.github+json" \
            "repos/$GITHUB_REPOSITORY/actions/artifacts/$HOST_ARTIFACT_ID/zip" > "$archive"
          test -s "$archive"
          test "$(wc -c < "$archive" | tr -d ' ')" -le 2147483648
          archive_sha256=$(shasum -a 256 "$archive" | awk '{print $1}')
          [[ "$archive_sha256" =~ ^[0-9a-f]{64}$ ]]
          test "sha256:$archive_sha256" = "$HOST_ARTIFACT_DIGEST"

          python3 - "$archive" "$host_bundle" <<'PY'
          import hashlib
          import os
          import re
          import stat
          import sys
          import zipfile

          archive, root = sys.argv[1:]
          expected_files = {
              "RELEASE_NOTES.md",
              "SHA256SUMS",
              "Simulator-arm64.dmg",
              "Simulator-arm64.zip",
              "app-inventory.jsonl",
              "attestations/provenance.sigstore.json",
              "attestations/sbom.sigstore.json",
              "bundle-metadata.json",
              "dmg-app-inventory.raw.jsonl",
              "dmg-signatures.json",
              "package-verification-code.txt",
              "packaged-files.sha256",
              "rc-validation.json",
              "sbom.spdx.json",
              "transport-normalization-policy.json",
              "verification-input.json",
              "zip-app-inventory.raw.jsonl",
              "zip-signatures.json",
          }
          expected_directories = {"attestations/"}
          maximum_total = 3 * 1024 * 1024 * 1024

          def maximum_for(path):
              if path in {"Simulator-arm64.dmg", "Simulator-arm64.zip"}:
                  return 1280 * 1024 * 1024
              if path in {"app-inventory.jsonl", "dmg-app-inventory.raw.jsonl", "zip-app-inventory.raw.jsonl"}:
                  return 256 * 1024 * 1024
              if path == "sbom.spdx.json":
                  return 128 * 1024 * 1024
              if path == "SHA256SUMS":
                  return 64 * 1024
              return 32 * 1024 * 1024

          seen = set()
          extracted = set()
          total = 0
          with zipfile.ZipFile(archive) as source:
              for info in source.infolist():
                  name = info.filename
                  if (not name or "\\" in name or "\x00" in name or name.startswith("/")
                          or any(part in ("", ".", "..") for part in name.rstrip("/").split("/"))
                          or name in seen):
                      raise ValueError("unsafe or duplicate Host artifact path")
                  seen.add(name)
                  mode = info.external_attr >> 16
                  kind = stat.S_IFMT(mode)
                  if stat.S_ISLNK(mode) or kind not in (0, stat.S_IFREG, stat.S_IFDIR):
                      raise ValueError("non-regular Host artifact member")
                  if info.flag_bits & 1:
                      raise ValueError("encrypted Host artifact member")
                  if info.compress_type not in (zipfile.ZIP_STORED, zipfile.ZIP_DEFLATED):
                      raise ValueError("unsupported Host artifact compression")
                  if info.is_dir():
                      if name not in expected_directories:
                          raise ValueError("unexpected Host artifact directory")
                      os.makedirs(os.path.join(root, name.rstrip("/")), mode=0o700, exist_ok=True)
                      continue
                  if name not in expected_files:
                      raise ValueError("unexpected Host artifact file")
                  limit = maximum_for(name)
                  if info.file_size < 1 or info.file_size > limit:
                      raise ValueError("Host artifact member exceeds limit")
                  total += info.file_size
                  if total > maximum_total:
                      raise ValueError("Host artifact exceeds total limit")
                  destination = os.path.join(root, *name.split("/"))
                  os.makedirs(os.path.dirname(destination), mode=0o700, exist_ok=True)
                  written = 0
                  with source.open(info) as reader, open(destination, "xb") as writer:
                      while chunk := reader.read(1024 * 1024):
                          written += len(chunk)
                          if written > info.file_size or written > limit:
                              raise ValueError("Host artifact expands beyond declared limit")
                          writer.write(chunk)
                  if written != info.file_size or os.path.getsize(destination) != info.file_size:
                      raise ValueError("Host artifact member changed during extraction")
                  os.chmod(destination, 0o600)
                  extracted.add(name)

          if extracted != expected_files or not seen.issubset(expected_files | expected_directories):
              raise ValueError("Host artifact does not match the exact Engineering RC closure")

          sums_path = os.path.join(root, "SHA256SUMS")
          with open(sums_path, "r", encoding="utf-8", newline="") as handle:
              sums_source = handle.read()
          if not sums_source.endswith("\n"):
              raise ValueError("Host SHA256SUMS is not canonical")
          expected_sums = sorted(expected_files - {"SHA256SUMS"})
          lines = sums_source[:-1].split("\n")
          if len(lines) != len(expected_sums):
              raise ValueError("Host SHA256SUMS count is invalid")
          for line, expected_path in zip(lines, expected_sums):
              match = re.fullmatch(r"([0-9a-f]{64})  ([A-Za-z0-9][A-Za-z0-9._/-]*)", line)
              if not match or match.group(2) != expected_path:
                  raise ValueError("Host SHA256SUMS order or path is invalid")
              digest = hashlib.sha256()
              with open(os.path.join(root, expected_path), "rb") as handle:
                  while chunk := handle.read(1024 * 1024):
                      digest.update(chunk)
              if digest.hexdigest() != match.group(1):
                  raise ValueError("Host artifact checksum mismatch")
          PY

          dmg="$host_bundle/Simulator-arm64.dmg"
          test -f "$dmg"
          test ! -L "$dmg"
          host_sha=$(shasum -a 256 "$dmg" | awk '{print $1}')
          [[ "$host_sha" =~ ^[0-9a-f]{64}$ ]]
          hdiutil attach -readonly -nobrowse -mountpoint "$mount_root" "$dmg" >/dev/null
          trap 'hdiutil detach "$mount_root" >/dev/null 2>&1 || true' EXIT
          test -d "$mount_root/Simulator.app"
          ditto "$mount_root/Simulator.app" "$packaged_root/Simulator.app"
          hdiutil detach "$mount_root" >/dev/null
          trap - EXIT
          test -x "$packaged_root/Simulator.app/Contents/MacOS/Simulator"
          printf 'HOST_ARTIFACT_SHA256=%s\n' "$host_sha" >> "$GITHUB_ENV"
          printf 'M1_PACKAGED_APP_PATH=%s\n' "$packaged_root/Simulator.app" >> "$GITHUB_ENV"

      - name: Generate fixed M1 seed authority
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          case_root="$RUNNER_TEMP/open-design-m1-cases"
          bun scripts/qa/generate-open-design-m1-case-artifacts-v2.ts "$case_root"
          printf 'M1_CASE_ARTIFACT_ROOT=%s\n' "$case_root" >> "$GITHUB_ENV"

      - name: Pin trusted external blackout proxy child
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          proxy_bun=$(realpath "$(command -v bun)")
          proxy_script=$(realpath scripts/qa/run-host-agent-blackout-proxy.ts)
          test -f "$proxy_bun"
          test -x "$proxy_bun"
          test -f "$proxy_script"
          test ! -L "$proxy_bun"
          test ! -L "$proxy_script"
          for trusted_path in "$proxy_bun" "$proxy_script"; do
            owner_uid=$(stat -f %u "$trusted_path")
            test "$owner_uid" = "$(id -u)" || test "$owner_uid" = "0"
            mode=$(stat -f %Lp "$trusted_path")
            (( (8#$mode & 8#022) == 0 ))
          done
          printf 'M1_BLACKOUT_PROXY_BUN_PATH=%s\n' "$proxy_bun" >> "$GITHUB_ENV"
          printf 'M1_BLACKOUT_PROXY_SCRIPT_PATH=%s\n' "$proxy_script" >> "$GITHUB_ENV"

      - name: Run 20 LKG and 20 RC real Tasks with direct observation
        id: machine_producer
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          output="$RUNNER_TEMP/open-design-m1-machine-evidence"
          failure_output="$RUNNER_TEMP/open-design-m1-machine-first-failure"
          work_root="$RUNNER_TEMP/open-design-m1-machine-work-$GITHUB_RUN_ID"
          printf 'M1_EVIDENCE_OUTPUT_ROOT=%s\n' "$output" >> "$GITHUB_ENV"
          printf 'M1_FIRST_FAILURE_OUTPUT_ROOT=%s\n' "$failure_output" >> "$GITHUB_ENV"
          printf 'M1_MACHINE_WORK_ROOT=%s\n' "$work_root" >> "$GITHUB_ENV"
          test ! -e "$output"
          test ! -e "$failure_output"
          test ! -e "$work_root"
          set +e
          M1_EVIDENCE_OUTPUT_ROOT="$output" \
            M1_FIRST_FAILURE_OUTPUT_ROOT="$failure_output" \
            M1_MACHINE_WORK_ROOT="$work_root" \
            bun scripts/qa/run-open-design-m1-machine-evidence.ts \
            > "$RUNNER_TEMP/open-design-m1-machine-result.json"
          producer_status=$?
          set -e
          failure_capsule=false
          if [ -d "$failure_output" ]; then failure_capsule=true; fi
          printf 'failure_capsule=%s\n' "$failure_capsule" >> "$GITHUB_OUTPUT"
          if [ "$producer_status" -ne 0 ]; then exit "$producer_status"; fi
          test "$(jq -er .status "$RUNNER_TEMP/open-design-m1-machine-result.json")" = passed
          test "$(jq -er .artifactName "$RUNNER_TEMP/open-design-m1-machine-result.json")" = open-design-m1-machine-evidence
          test "$(jq -er .fileCount "$RUNNER_TEMP/open-design-m1-machine-result.json")" = 150

      - name: Recheck bounded first-failure capsule
        id: first_failure_verifier
        if: ${{ always() && steps.machine_producer.outcome == 'failure' && steps.machine_producer.outputs.failure_capsule == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          bun_path=$(realpath "$(command -v bun)")
          test -x "$bun_path"
          env -i \
            GITHUB_SHA="$GITHUB_SHA" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            HOST_BUILD_RUN_ID="$HOST_BUILD_RUN_ID" \
            HOST_ARTIFACT_SHA256="$HOST_ARTIFACT_SHA256" \
            H1_CONNECTION_EVIDENCE_SHA256="$H1_CONNECTION_EVIDENCE_SHA256" \
            H1_A1_AUTHORITY_SHA256="$H1_A1_AUTHORITY_SHA256" \
            "$bun_path" scripts/qa/verify-open-design-m1-machine-first-failure.ts \
            "$M1_FIRST_FAILURE_OUTPUT_ROOT" \
            > "$RUNNER_TEMP/open-design-m1-machine-first-failure-result.json"
          test "$(jq -er .status "$RUNNER_TEMP/open-design-m1-machine-first-failure-result.json")" = failed
          test "$(jq -er .artifactName "$RUNNER_TEMP/open-design-m1-machine-first-failure-result.json")" = open-design-m1-machine-first-failure
          test "$(jq -er .fileCount "$RUNNER_TEMP/open-design-m1-machine-first-failure-result.json")" = 2
          test "$(jq -er .totalBytes "$RUNNER_TEMP/open-design-m1-machine-first-failure-result.json")" -le 32768

      - name: Upload bounded first-failure capsule
        if: ${{ always() && steps.machine_producer.outcome == 'failure' && steps.machine_producer.outputs.failure_capsule == 'true' && steps.first_failure_verifier.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: open-design-m1-machine-first-failure
          path: ${{ env.M1_FIRST_FAILURE_OUTPUT_ROOT }}/
          if-no-files-found: error
          retention-days: 30

      - name: Recheck sealed artifact inventory
        if: ${{ steps.machine_producer.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          test "$(find "$M1_EVIDENCE_OUTPUT_ROOT" -type f | wc -l | tr -d ' ')" = "150"
          test "$(find "$M1_EVIDENCE_OUTPUT_ROOT" -type l | wc -l | tr -d ' ')" = "0"
          total_bytes=$(find "$M1_EVIDENCE_OUTPUT_ROOT" -type f -exec stat -f %z {} \; | awk '{sum += $1} END {print sum + 0}')
          test "$total_bytes" -le $((96 * 1024 * 1024))
          manifest_sha=$(shasum -a 256 "$M1_EVIDENCE_OUTPUT_ROOT/machine-manifest.json" | awk '{print $1}')
          test "$manifest_sha" = "$(jq -er .sha256 "$RUNNER_TEMP/open-design-m1-machine-result.json")"
          printf '### OpenDesign M1 machine evidence\n\n- Files: 150\n- Manifest SHA-256: `%s`\n' \
            "$manifest_sha" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sealed machine evidence
        if: ${{ steps.machine_producer.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: open-design-m1-machine-evidence
          path: ${{ env.M1_EVIDENCE_OUTPUT_ROOT }}/
          if-no-files-found: error
          retention-days: 90

      - name: Remove ephemeral packaged and seed inputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          for path in \
            "$RUNNER_TEMP/open-design-m1-host-bundle" \
            "$RUNNER_TEMP/open-design-m1-host-bundle.zip" \
            "$RUNNER_TEMP/open-design-m1-mount" \
            "$RUNNER_TEMP/open-design-m1-packaged" \
            "$RUNNER_TEMP/open-design-m1-cases" \
            "${M1_MACHINE_WORK_ROOT:-}" \
            "${M1_EVIDENCE_OUTPUT_ROOT:-}" \
            "${M1_FIRST_FAILURE_OUTPUT_ROOT:-}" \
            "$RUNNER_TEMP/open-design-m1-machine-result.json" \
            "$RUNNER_TEMP/open-design-m1-h1-a1-claim-result.json" \
            "$RUNNER_TEMP/open-design-m1-machine-first-failure-result.json"; do
            if [ -z "$path" ]; then continue; fi
            if [ -e "$path" ]; then rm -rf -- "$path"; fi
          done

      - name: Fail the stopped batch after preserving first-failure evidence
        if: ${{ always() && steps.machine_producer.outcome == 'failure' }}
        shell: bash
        run: exit 1
