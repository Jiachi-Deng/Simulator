name: Engineering RC Bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: Canonical RC version (for example, 0.12.0-rc.1)
        required: true
        type: string
      source_sha:
        description: Full commit SHA; must exactly match the current origin/main tip
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: engineering-rc-${{ inputs.version }}-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  unsigned-arm64:
    name: Unsigned macOS arm64 engineering RC
    runs-on: macos-15
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RC_VERSION: ${{ inputs.version }}
      SOURCE_SHA: ${{ inputs.source_sha }}

    steps:
      - name: Checkout exact source SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 0

      - name: Fetch and verify origin main
        shell: bash
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "source_sha must be a full lowercase commit SHA"; exit 1; }
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git fetch --tags origin
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git merge-base --is-ancestor "$SOURCE_SHA" refs/remotes/origin/main
          test "$SOURCE_SHA" = "$(git rev-parse refs/remotes/origin/main)"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Validate RC contract
        run: |
          bun scripts/release/engineering-rc.ts --version "$RC_VERSION" --ref "$SOURCE_SHA" > "$RUNNER_TEMP/engineering-rc-validation.json"
          mv "$RUNNER_TEMP/engineering-rc-validation.json" engineering-rc-validation.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run existing validation
        run: bun run validate:ci

      - name: Run existing Electron build
        run: bun run electron:build

      - name: Build unsigned arm64 DMG and ZIP
        run: |
          test "$(uname -m)" = "arm64"
          bun run electron:dist:unsigned:mac:arm64

      - name: Verify unsigned artifacts and create bundle
        shell: bash
        run: scripts/release/verify-and-bundle-macos.sh "$RC_VERSION" apps/electron/release engineering-rc-bundle

      - name: Generate deterministic minimal SPDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          CREATED=$(git show -s --format=%cI "$SOURCE_SHA")
          bun scripts/release/generate-spdx.ts bun.lock engineering-rc-bundle/sbom.spdx.json "$RC_VERSION" "$SOURCE_SHA" "$CREATED"
          cp "apps/electron/resources/release-notes/$RC_VERSION.md" engineering-rc-bundle/RELEASE_NOTES.md
          cp engineering-rc-validation.json engineering-rc-bundle/rc-validation.json
          printf '{\n  "schemaVersion": 1,\n  "version": "%s",\n  "sourceSha": "%s",\n  "signed": false,\n  "channel": "engineering-rc"\n}\n' \
            "$RC_VERSION" "$SOURCE_SHA" > engineering-rc-bundle/bundle-metadata.json
          bun scripts/release/verify-bundle-policy.ts engineering-rc-bundle
          (
            cd engineering-rc-bundle
            find . -maxdepth 1 -type f ! -name SHA256SUMS -print | LC_ALL=C sort | sed 's#^./##' | xargs shasum -a 256 > SHA256SUMS
          )

      - name: Attest engineering RC bundle
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.0.0
        with:
          subject-path: engineering-rc-bundle/*

      - name: Upload engineering RC bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: simulator-${{ inputs.version }}-macos-arm64-unsigned
          path: engineering-rc-bundle/
          if-no-files-found: error
          retention-days: 30
