name: Module Coordinator

on:
  pull_request:
    paths:
      - ".github/workflows/module-coordinator.yml"
      - "bun.lock"
      - "package.json"
      - "packages/module-coordinator/**"
      - "packages/module-contract/**"
      - "packages/module-release-trust/**"
      - "packages/module-downloader/**"
      - "packages/module-installer/**"
      - "packages/module-registry/**"
      - "packages/module-daemon/**"
      - "packages/module-agent-gateway/**"
      - "packages/host-agent-contract/**"
      - "packages/host-agent-run-core/**"
      - "packages/host-agent-broker/**"
      - "packages/host-agent-shim/**"
      - "packages/server-core/src/handlers/session-manager-interface.ts"
      - "packages/server-core/src/sessions/**"
      - "packages/shared/src/sessions/**"
      - "packages/shared/tests/persistence-queue.test.ts"
      - "packages/shared/src/agent/backend/types.ts"
      - "packages/shared/src/agent/claude-agent.ts"
      - "packages/shared/src/agent/__tests__/claude-agent-module-process-lifecycle.test.ts"
      - "packages/shared/src/agent/pi-agent.ts"
      - "packages/shared/src/agent/core/pre-tool-use.ts"
      - "packages/shared/src/agent/module-agent-tool-boundary.ts"
      - "packages/shared/src/agent/__tests__/module-agent-tool-boundary.test.ts"
      - "packages/shared/src/agent/provider-process-reaper.ts"
      - "packages/shared/src/agent/provider-process-reaper.test.ts"
      - "packages/shared/src/agent/index.ts"
      - "packages/pi-agent-server/src/file-tool-path-input.ts"
      - "packages/pi-agent-server/src/file-tool-path-input.test.ts"
      - "packages/pi-agent-server/src/index.ts"
      - "modules/open-design/**"
      - "apps/electron/package.json"
      - "apps/electron/electron-builder.yml"
      - "apps/electron/resources/host-agent/**"
      - "apps/electron/scripts/copy-assets.ts"
      - "apps/electron/scripts/host-module-coordinator-smoke.test.ts"
      - "apps/electron/scripts/host-module-coordinator-smoke.ts"
      - "apps/electron/scripts/host-module-smoke-public-failure.ts"
      - "apps/electron/scripts/stage-module-coordinator-smoke-resources.ts"
      - "apps/electron/scripts/validate-assets.ts"
      - "apps/electron/src/host-agent/**"
      - "apps/electron/src/main/electron-module-view-port.ts"
      - "apps/electron/src/main/host-module-coordinator.ts"
      - "apps/electron/src/main/host-module-coordinator-smoke.ts"
      - "apps/electron/src/main/host-module-smoke-deadline.ts"
      - "apps/electron/src/main/host-module-smoke-deadline.test.ts"
      - "apps/electron/src/main/index.ts"
      - "apps/electron/src/main/module-agent-runtime.ts"
      - "apps/electron/src/main/module-agent-runtime.test.ts"
      - "apps/electron/src/main/module-agent-worker-recovery.ts"
      - "apps/electron/src/main/module-agent-worker-recovery.test.ts"
      - "apps/electron/src/main/module-view-manager.ts"
      - "apps/electron/src/preload/module-view.ts"
  push:
    branches: [main]
    paths:
      - ".github/workflows/module-coordinator.yml"
      - "bun.lock"
      - "package.json"
      - "packages/module-coordinator/**"
      - "packages/module-contract/**"
      - "packages/module-release-trust/**"
      - "packages/module-downloader/**"
      - "packages/module-installer/**"
      - "packages/module-registry/**"
      - "packages/module-daemon/**"
      - "packages/module-agent-gateway/**"
      - "packages/host-agent-contract/**"
      - "packages/host-agent-run-core/**"
      - "packages/host-agent-broker/**"
      - "packages/host-agent-shim/**"
      - "packages/server-core/src/handlers/session-manager-interface.ts"
      - "packages/server-core/src/sessions/**"
      - "packages/shared/src/sessions/**"
      - "packages/shared/tests/persistence-queue.test.ts"
      - "packages/shared/src/agent/backend/types.ts"
      - "packages/shared/src/agent/claude-agent.ts"
      - "packages/shared/src/agent/__tests__/claude-agent-module-process-lifecycle.test.ts"
      - "packages/shared/src/agent/pi-agent.ts"
      - "packages/shared/src/agent/core/pre-tool-use.ts"
      - "packages/shared/src/agent/module-agent-tool-boundary.ts"
      - "packages/shared/src/agent/__tests__/module-agent-tool-boundary.test.ts"
      - "packages/shared/src/agent/provider-process-reaper.ts"
      - "packages/shared/src/agent/provider-process-reaper.test.ts"
      - "packages/shared/src/agent/index.ts"
      - "packages/pi-agent-server/src/file-tool-path-input.ts"
      - "packages/pi-agent-server/src/file-tool-path-input.test.ts"
      - "packages/pi-agent-server/src/index.ts"
      - "modules/open-design/**"
      - "apps/electron/package.json"
      - "apps/electron/electron-builder.yml"
      - "apps/electron/resources/host-agent/**"
      - "apps/electron/scripts/copy-assets.ts"
      - "apps/electron/scripts/host-module-coordinator-smoke.test.ts"
      - "apps/electron/scripts/host-module-coordinator-smoke.ts"
      - "apps/electron/scripts/host-module-smoke-public-failure.ts"
      - "apps/electron/scripts/stage-module-coordinator-smoke-resources.ts"
      - "apps/electron/scripts/validate-assets.ts"
      - "apps/electron/src/host-agent/**"
      - "apps/electron/src/main/electron-module-view-port.ts"
      - "apps/electron/src/main/host-module-coordinator.ts"
      - "apps/electron/src/main/host-module-coordinator-smoke.ts"
      - "apps/electron/src/main/host-module-smoke-deadline.ts"
      - "apps/electron/src/main/host-module-smoke-deadline.test.ts"
      - "apps/electron/src/main/index.ts"
      - "apps/electron/src/main/module-agent-runtime.ts"
      - "apps/electron/src/main/module-agent-runtime.test.ts"
      - "apps/electron/src/main/module-agent-worker-recovery.ts"
      - "apps/electron/src/main/module-agent-worker-recovery.test.ts"
      - "apps/electron/src/main/module-view-manager.ts"
      - "apps/electron/src/preload/module-view.ts"
  workflow_dispatch:

concurrency:
  group: module-coordinator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  module-coordinator:
    name: Module Coordinator (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: bun run test:module-registry
      - run: bun run validate:module-coordinator

  module-coordinator-gate:
    name: Module Coordinator Gate
    needs: [module-coordinator, module-coordinator-packaged-smoke, module-coordinator-electron-packaged-smoke]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require all module coordinator platforms
        env:
          MATRIX_RESULT: ${{ needs.module-coordinator.result }}
          PACKAGED_RESULT: ${{ needs.module-coordinator-packaged-smoke.result }}
          ELECTRON_RESULT: ${{ needs.module-coordinator-electron-packaged-smoke.result }}
        run: |
          if [[ "$MATRIX_RESULT" != "success" ]]; then
            echo "Module coordinator matrix result: $MATRIX_RESULT"
            exit 1
          fi
          if [[ "$PACKAGED_RESULT" != "success" ]]; then
            echo "Module coordinator packaged smoke result: $PACKAGED_RESULT"
            exit 1
          fi
          if [[ "$ELECTRON_RESULT" != "success" ]]; then
            echo "Module coordinator Electron packaged smoke result: $ELECTRON_RESULT"
            exit 1
          fi

  module-coordinator-packaged-smoke:
    name: Packaged Module Smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: bun run test:module-coordinator:packaged

  module-coordinator-electron-packaged-smoke:
    name: Electron Packaged Module Coordinator Smoke (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"
      - run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate Host Agent Session isolation seams
        run: >-
          bun test
          packages/server-core/src/sessions/module-agent-admission.test.ts
          packages/server-core/src/sessions/create-managed-session.test.ts
          packages/server-core/src/sessions/claude-disposal-containment.test.ts
          packages/server-core/src/sessions/module-agent-adapter.test.ts
          packages/server-core/src/sessions/transient-module-startup.test.ts
          packages/server-core/src/sessions/transient-session-reap.test.ts
          packages/server-core/src/sessions/visible-craft-turn-gate.test.ts
          packages/server-core/src/sessions/visible-craft-turn-priority.test.ts
          packages/shared/tests/persistence-queue.test.ts
          packages/shared/src/sessions/__tests__/module-agent-run.test.ts
          packages/shared/src/sessions/__tests__/bundle.test.ts
          packages/shared/src/agent/__tests__/claude-agent-module-process-lifecycle.test.ts
          packages/shared/src/agent/__tests__/module-agent-tool-boundary.test.ts
          packages/shared/src/agent/provider-process-reaper.test.ts
          packages/pi-agent-server/src/file-tool-path-input.test.ts
          apps/electron/src/main/module-agent-runtime.test.ts
          apps/electron/src/main/module-agent-worker-recovery.test.ts
          apps/electron/src/main/host-module-smoke-deadline.test.ts
      - name: Validate Host Agent Run Core closure
        run: bun run validate:host-agent-run-core
      - name: Validate Host-owned zero-argument Shim launcher
        run: |
          bun run validate:host-agent-shim
          bun test apps/electron/src/host-agent/__tests__/resource-integrity.test.ts
      - name: Validate packaged smoke scenario closure
        run: bun test apps/electron/scripts/host-module-coordinator-smoke.test.ts
      - name: Build Electron and subprocess bundles
        run: bun run electron:build
      - name: Stage packaged Electron native resources
        run: |
          test -f packages/pi-agent-server/dist/index.js
          bun apps/electron/scripts/stage-module-coordinator-smoke-resources.ts
      - name: Build unpacked packaged app
        working-directory: apps/electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bunx electron-builder --dir --config electron-builder.yml --mac --publish never
      - name: Validate exact packaged Host Agent resources
        run: |
          app_path="$(find apps/electron/release -maxdepth 3 -name Simulator.app -print -quit)"
          test -n "$app_path"
          app_path="$(cd "$(dirname "$app_path")" && pwd)/$(basename "$app_path")"
          (cd apps/electron && bun scripts/validate-assets.ts --packaged-app "$app_path")
          echo "PACKAGED_SIMULATOR_APP=$app_path" >> "$GITHUB_ENV"
      - name: Run packaged v1 OpenDesign Compatibility protocol fixture
        run: >-
          bun run test:module-coordinator:electron --
          --app "$PACKAGED_SIMULATOR_APP"
          --scenario v1-compat
      - name: Run packaged v2 OpenDesign ordinary Shim protocol fixture
        run: >-
          bun run test:module-coordinator:electron --
          --app "$PACKAGED_SIMULATOR_APP"
          --scenario v2-open-design-rc
