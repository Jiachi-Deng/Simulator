name: OpenDesign Artifact Policy

on:
  pull_request:
    paths:
      - ".github/workflows/open-design-artifact-policy.yml"
      - "bun.lock"
      - "bunfig.toml"
      - "modules/open-design/**"
      - "package.json"
      - "packages/module-contract/**"
      - "packages/module-installer/**"
      - "packages/module-release-trust/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/open-design-artifact-policy.yml"
      - "bun.lock"
      - "bunfig.toml"
      - "modules/open-design/**"
      - "package.json"
      - "packages/module-contract/**"
      - "packages/module-installer/**"
      - "packages/module-release-trust/**"
  workflow_dispatch:

concurrency:
  group: open-design-artifact-policy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate OpenDesign artifact policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/open-design/package-lock.json

      - name: Install exact workspace dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install exact dependencies
        run: npm ci
        working-directory: modules/open-design

      - name: Test policy
        run: npm test
        working-directory: modules/open-design

      - name: Check syntax
        run: npm run typecheck
        working-directory: modules/open-design

      - name: Validate golden inventory
        run: npm run build
        working-directory: modules/open-design
