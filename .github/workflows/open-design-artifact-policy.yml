name: OpenDesign Artifact Policy

on:
  pull_request:
    paths:
      - ".github/workflows/open-design-artifact-policy.yml"
      - "modules/open-design/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/open-design-artifact-policy.yml"
      - "modules/open-design/**"
  workflow_dispatch:

concurrency:
  group: open-design-artifact-policy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate OpenDesign artifact policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/open-design/package-lock.json

      - name: Install exact dependencies
        run: npm ci
        working-directory: modules/open-design

      - name: Test policy
        run: npm test
        working-directory: modules/open-design

      - name: Check syntax
        run: npm run typecheck
        working-directory: modules/open-design

      - name: Validate golden inventory
        run: npm run build
        working-directory: modules/open-design
