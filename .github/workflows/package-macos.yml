name: macOS Package Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/package-macos.yml"
      - "apps/electron/electron-builder.yml"
      - "apps/electron/electron-builder.env"
      - "apps/electron/scripts/build-dmg.sh"
      - "apps/electron/scripts/afterPack.cjs"
      - "apps/electron/resources/**"
      - "scripts/electron-build-*.ts"
      - "scripts/build-environment.ts"
      - "scripts/packaged-server-resources.ts"
      - "scripts/release/updates-disabled.ts"
      - "scripts/release/verify-and-bundle-macos.sh"
      - "scripts/release/verify-macos-signatures.ts"
      - "scripts/release/verify-packaged-electron-identity.ts"
      - "scripts/release/verify-public-build-privacy.ts"
      - "scripts/release/write-app-inventory.py"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unsigned-arm64:
    name: Unsigned macOS arm64
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Stage pinned ripgrep postinstall asset
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}
          RIPGREP_PACKAGE_VERSION: "1.17.1"
          RIPGREP_ASSET_NAME: "ripgrep-v15.0.1-aarch64-apple-darwin.tar.gz"
          RIPGREP_ASSET_URL: "https://github.com/microsoft/ripgrep-prebuilt/releases/download/v15.0.1/ripgrep-v15.0.1-aarch64-apple-darwin.tar.gz"
          RIPGREP_ASSET_SHA256: "2fa16464fd8638588a67c7fc172d3c4b57fbdc65dff366e10b0b0e90734628a6"
        run: |
          set -euo pipefail
          cache_dir="${TMPDIR%/}/vscode-ripgrep-cache-${RIPGREP_PACKAGE_VERSION}"
          asset_path="$cache_dir/$RIPGREP_ASSET_NAME"
          mkdir -p "$cache_dir"
          download_path=$(mktemp "$cache_dir/.ripgrep-download.XXXXXX")
          trap 'rm -f "$download_path"' EXIT
          curl --proto '=https' --tlsv1.2 --fail --location \
            --retry 3 --retry-all-errors --silent --show-error \
            "$RIPGREP_ASSET_URL" --output "$download_path"
          printf '%s  %s\n' "$RIPGREP_ASSET_SHA256" "$download_path" | shasum -a 256 -c -
          test "$(tar -tzf "$download_path")" = "rg"
          mv "$download_path" "$asset_path"

      - name: Build unsigned arm64 package
        # electron-builder otherwise suppresses every signing path for pull_request
        # builds, leaving the modified Electron bundle with stale signature metadata.
        # This build step receives no persisted repository credential or release
        # secret. The unsigned script clears signing inputs, so only ad-hoc (`-`) remains.
        env:
          TMPDIR: ${{ runner.temp }}
          CSC_FOR_PULL_REQUEST: "true"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          test "$(uname -m)" = "arm64"
          bun run electron:dist:unsigned:mac:arm64

      - name: Verify artifact and architecture
        shell: bash
        run: |
          shopt -s nullglob
          dmgs=(apps/electron/release/*-arm64.dmg)
          if [[ ${#dmgs[@]} -ne 1 ]]; then
            printf 'Expected exactly one arm64 DMG, found %s\n' "${#dmgs[@]}"
            exit 1
          fi
          if [[ -d apps/electron/release/mac ]]; then
            echo "Unexpected x64 app output was produced"
            exit 1
          fi
          hdiutil verify "${dmgs[0]}"
          app_binaries=(apps/electron/release/mac-arm64/*.app/Contents/MacOS/*)
          if [[ ${#app_binaries[@]} -ne 1 ]]; then
            echo "Packaged app executable was not found"
            exit 1
          fi
          if [[ "$(lipo -archs "${app_binaries[0]}")" != "arm64" ]]; then
            echo "Packaged app executable is not arm64-only"
            exit 1
          fi
          while IFS= read -r -d '' artifact; do
            description=$(file -b "$artifact")
            if [[ "$description" != *"Mach-O"* ]]; then
              continue
            fi
            archs=$(lipo -archs "$artifact")
            if [[ "$archs" != "arm64" ]]; then
              echo "Mach-O artifact is not arm64-only: $artifact ($archs)"
              exit 1
            fi
          done < <(find apps/electron/release/mac-arm64 -type f -print0)
          app_root=apps/electron/release/mac-arm64/Simulator.app
          product_version=$(node -p "require('./apps/electron/package.json').version")
          executable_name=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_root/Contents/Info.plist")
          bun scripts/release/verify-packaged-electron-identity.ts "$app_root" "$product_version"
          bun scripts/release/verify-macos-signatures.ts \
            "$app_root" "Contents/MacOS/$executable_name" \
            > apps/electron/release/package-signatures.json
          test "$(jq -er .requiredArm64MachOFileType apps/electron/release/package-signatures.json)" = EXECUTE
          jq -e 'all(.objects[]; .kind == "adhoc" and .strictVerification.exitCode == 0)' \
            apps/electron/release/package-signatures.json >/dev/null
          shasum -a 256 "${dmgs[0]}" | tee apps/electron/release/SHA256SUMS

      - name: Upload engineering artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: simulator-macos-arm64-unsigned
          path: |
            apps/electron/release/*-arm64.dmg
            apps/electron/release/SHA256SUMS
          if-no-files-found: error
          retention-days: 3
