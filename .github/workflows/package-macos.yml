name: macOS Package Smoke

on:
  pull_request:
    paths:
      - ".github/workflows/package-macos.yml"
      - "apps/electron/electron-builder.yml"
      - "apps/electron/scripts/build-dmg.sh"
      - "apps/electron/scripts/afterPack.cjs"
      - "apps/electron/resources/**"
      - "scripts/electron-build-*.ts"
      - "scripts/build-environment.ts"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unsigned-arm64:
    name: Unsigned macOS arm64
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Build unsigned arm64 package
        run: bun run electron:dist:unsigned:mac:arm64

      - name: Verify artifact and architecture
        shell: bash
        run: |
          shopt -s nullglob
          dmgs=(apps/electron/release/*-arm64.dmg)
          if [[ ${#dmgs[@]} -ne 1 ]]; then
            printf 'Expected exactly one arm64 DMG, found %s\n' "${#dmgs[@]}"
            exit 1
          fi
          if [[ -d apps/electron/release/mac ]]; then
            echo "Unexpected x64 app output was produced"
            exit 1
          fi
          hdiutil verify "${dmgs[0]}"
          app_binaries=(apps/electron/release/mac-arm64/*.app/Contents/MacOS/*)
          if [[ ${#app_binaries[@]} -ne 1 ]]; then
            echo "Packaged app executable was not found"
            exit 1
          fi
          file "${app_binaries[0]}" | grep -q 'arm64'
          shasum -a 256 "${dmgs[0]}" | tee apps/electron/release/SHA256SUMS

      - name: Upload engineering artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: simulator-macos-arm64-unsigned
          path: |
            apps/electron/release/*-arm64.dmg
            apps/electron/release/SHA256SUMS
          if-no-files-found: error
          retention-days: 3
