name: Module Host Bridge

on:
  pull_request:
    paths:
      - ".github/workflows/module-host-bridge.yml"
      - "packages/module-host-bridge/**"
      - "package.json"
      - "bun.lock"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/module-host-bridge.yml"
      - "packages/module-host-bridge/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: module-host-bridge-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Module Host Bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.1.2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Module Host Bridge
        run: bun run validate:module-host-bridge
