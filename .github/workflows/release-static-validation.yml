name: Release Static Validation

on:
  pull_request:
    paths:
      - .github/workflows/engineering-rc.yml
      - .github/workflows/open-design-production-input.yml
      - .github/workflows/open-design-release.yml
      - .github/workflows/open-design-m1-machine-evidence.yml
      - .github/workflows/open-design-m1-visual-attestation.yml
      - .github/workflows/open-design-rc-acceptance.yml
      - .github/workflows/open-design-acceptance-rollback.yml
      - .github/workflows/open-design-release.md
      - .github/workflows/release-static-validation.yml
      - scripts/release/**
      - scripts/qa/open-design-rc-acceptance-evidence.ts
      - scripts/qa/open-design-rc-acceptance-evidence.test.ts
      - scripts/qa/open-design-m1-*.ts
      - scripts/qa/run-open-design-m1-machine-evidence.ts
      - scripts/build-policy.ts
      - scripts/build-policy.test.ts
      - scripts/build-environment.ts
      - scripts/build-environment.test.ts
      - scripts/electron-build-main.ts
      - scripts/build/**
      - apps/electron/scripts/build-dmg.sh
      - apps/electron/scripts/build-win.ps1
      - apps/electron/package.json
      - apps/electron/electron-builder.yml
      - apps/electron/src/main/auto-update.ts
      - apps/electron/src/main/update-policy.ts
      - apps/electron/src/main/__tests__/auto-update-disabled.isolated.test.ts
      - apps/electron/src/main/__tests__/update-policy.isolated.test.ts
      - package.json
      - bun.lock
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-static-validation:
    name: Release static validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: modules/open-design/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install exact OpenDesign publisher dependencies
        run: |
          bun install --frozen-lockfile --ignore-scripts
          npm ci --ignore-scripts --prefix modules/open-design

      - name: Run release unit tests
        run: >-
          bun test scripts/release/*.test.ts
          scripts/qa/open-design-m1-machine-evidence.test.ts
          scripts/qa/open-design-m1-visual-attestation.test.ts
          scripts/qa/open-design-m1-final-evidence.test.ts
          scripts/qa/open-design-rc-acceptance-evidence.test.ts
          scripts/build-environment.test.ts scripts/build-policy.test.ts

      - name: Parse release workflow YAML
        run: >-
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.safe_load(File.read(path), aliases: true) }' .github/workflows/engineering-rc.yml .github/workflows/open-design-production-input.yml .github/workflows/open-design-release.yml .github/workflows/open-design-m1-machine-evidence.yml .github/workflows/open-design-m1-visual-attestation.yml .github/workflows/open-design-rc-acceptance.yml .github/workflows/open-design-acceptance-rollback.yml .github/workflows/release-static-validation.yml

      - name: Validate embedded release workflow Bash
        shell: bash
        run: |
          ruby <<'RUBY'
          require "open3"
          require "yaml"

          paths = [
            ".github/workflows/engineering-rc.yml",
            ".github/workflows/open-design-production-input.yml",
            ".github/workflows/open-design-release.yml",
            ".github/workflows/open-design-m1-machine-evidence.yml",
            ".github/workflows/open-design-m1-visual-attestation.yml",
            ".github/workflows/open-design-rc-acceptance.yml",
            ".github/workflows/open-design-acceptance-rollback.yml",
          ]
          paths.each do |path|
            workflow = YAML.safe_load(File.read(path), aliases: true)
            workflow.fetch("jobs").each do |job_name, job|
              job.fetch("steps", []).each do |step|
                next unless step["run"].is_a?(String)
                shell = step["shell"]
                runner = job.fetch("runs-on", "").to_s.downcase
                next unless shell == "bash" || (shell.nil? && !runner.include?("windows"))

                _stdout, stderr, status = Open3.capture3("bash", "-n", stdin_data: step.fetch("run"))
                next if status.success?

                abort("#{path}/#{job_name}/#{step.fetch("name", "unnamed")}: #{stderr}")
              end
            end
          end
          RUBY

      - name: Parse release shell scripts
        run: find scripts/release -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n

      - name: Check whitespace diff
        shell: bash
        env:
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" = pull_request ]]; then
            [[ "$PULL_REQUEST_BASE_SHA" =~ ^[0-9a-f]{40}$ ]]
            git diff --check "$PULL_REQUEST_BASE_SHA" HEAD
          else
            test "$GITHUB_EVENT_NAME" = workflow_dispatch
            test "$GITHUB_REF" = refs/heads/main
            git diff --check HEAD^ HEAD
          fi
