name: Module Daemon

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: module-daemon-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  module-daemon:
    name: Module Daemon (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run full module daemon tests
        run: bun run test:module-daemon

      - name: Typecheck module daemon
        run: bun run typecheck:module-daemon

      - name: Build module daemon
        run: bun run build:module-daemon

  module-daemon-gate:
    name: Module Daemon Gate
    needs: module-daemon
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require all module daemon platforms
        env:
          MATRIX_RESULT: ${{ needs.module-daemon.result }}
        run: |
          if [[ "$MATRIX_RESULT" != "success" ]]; then
            echo "Module daemon matrix result: $MATRIX_RESULT"
            exit 1
          fi
