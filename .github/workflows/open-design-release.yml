name: OpenDesign Release

on:
  schedule:
    - cron: "23 */12 * * *"
  workflow_dispatch:
    inputs:
      operation:
        description: Initial publication is manual; refresh is limited to the current stable release or the fixed 0.14.6-rc.1 prerelease.
        required: true
        default: refresh
        type: choice
        options:
          - refresh
          - initial
      release_track:
        description: RC publication is isolated from the stable official channel; stable requires separate protected approval.
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable
      module_version:
        description: Exact module version. RC is 0.14.6-rc.1; stable promotion is 0.14.6.
        required: true
        default: 0.14.6-rc.1
        type: string
      release_tag:
        description: Exact tag; must equal open-design-v plus module_version.
        required: true
        default: open-design-v0.14.6-rc.1
        type: string
      source_run_id:
        description: Successful origin/main run containing the fixed initial-input artifact; required only for initial.
        required: false
        type: string
      acceptance_run_id:
        description: Stable only. Successful final-Host-SHA OpenDesign RC acceptance evidence run.
        required: false
        type: string
      rollback_gate_run_id:
        description: Stable only. Successful final-Host-SHA rollback gate bound to the same RC-source evidence.
        required: false
        type: string
      stable_channel_confirmation:
        description: Enter PROMOTE_OPEN_DESIGN_0_14_6 for stable publication, REFRESH_OPEN_DESIGN_<stable version with underscores> for stable refresh, or REFRESH_OPEN_DESIGN_0_14_6_RC_1 for the fixed RC refresh.
        required: false
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: open-design-release-transaction
  cancel-in-progress: false

env:
  RELEASE_OWNER: Jiachi-Deng
  RELEASE_REPOSITORY: Simulator

jobs:
  initial:
    name: Initial OpenDesign publication
    if: >-
      github.repository == 'Jiachi-Deng/Simulator' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.operation == 'initial' &&
      ((inputs.release_track == 'prerelease' && vars.OPEN_DESIGN_PRERELEASE_ENABLED == 'true') ||
       (inputs.release_track == 'stable' && vars.OPEN_DESIGN_RELEASE_ENABLED == 'true' &&
        vars.OPEN_DESIGN_STABLE_CHANNEL_ENABLED == 'true'))
    runs-on: macos-15
    timeout-minutes: 45
    environment:
      name: ${{ inputs.release_track == 'stable' && 'open-design-production' || 'open-design-prerelease' }}
      url: https://github.com/Jiachi-Deng/Simulator/releases/tag/${{ inputs.release_tag }}
    env:
      RELEASE_TRACK: ${{ inputs.release_track }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      MODULE_VERSION: ${{ inputs.module_version }}
      ARCHIVE_ASSET: org.simulator.open-design-${{ inputs.module_version }}-darwin-arm64.tar.gz
      CATALOG_ASSET: org.simulator.open-design-${{ inputs.module_version }}-catalog-v2.json
      ENVELOPE_ASSET: org.simulator.open-design-${{ inputs.module_version }}-catalog-v2-envelope.json
      CONFIG_ASSET: open-design-official-channel.json
      METADATA_ASSET: org.simulator.open-design-${{ inputs.module_version }}-release-metadata.json
      STABLE_CHANNEL_CONFIRMATION: ${{ inputs.stable_channel_confirmation }}
      ACCEPTANCE_RUN_ID: ${{ inputs.acceptance_run_id }}
      ROLLBACK_GATE_RUN_ID: ${{ inputs.rollback_gate_run_id }}
      KEY_ID: ${{ vars.OPEN_DESIGN_RELEASE_KEY_ID }}
      KEY_ACTIVE_FROM: ${{ vars.OPEN_DESIGN_RELEASE_KEY_ACTIVE_FROM }}
      KEY_ACTIVE_UNTIL: ${{ vars.OPEN_DESIGN_RELEASE_KEY_ACTIVE_UNTIL }}
      HOST_VERSION_RANGE: ">=0.12.0"
      LKG_RELEASE_TAG: open-design-v0.14.5
      LKG_MODULE_VERSION: 0.14.5
      LKG_ARCHIVE_ASSET: org.simulator.open-design-0.14.5-darwin-arm64.tar.gz
      LKG_CATALOG_ASSET: org.simulator.open-design-0.14.5-catalog-v2.json
      LKG_ENVELOPE_ASSET: org.simulator.open-design-0.14.5-catalog-v2-envelope.json
      LKG_METADATA_ASSET: org.simulator.open-design-0.14.5-release-metadata.json
      RC_RELEASE_TAG: open-design-v0.14.6-rc.1
      RC_SOURCE_SHA: 6b39a9bcc0f158645897976e23f334c5cab771f4
      RC_MODULE_VERSION: 0.14.6-rc.1
      RC_ARCHIVE_ASSET: org.simulator.open-design-0.14.6-rc.1-darwin-arm64.tar.gz
      RC_CATALOG_ASSET: org.simulator.open-design-0.14.6-rc.1-catalog-v2.json
      RC_ENVELOPE_ASSET: org.simulator.open-design-0.14.6-rc.1-catalog-v2-envelope.json
      RC_METADATA_ASSET: org.simulator.open-design-0.14.6-rc.1-release-metadata.json

    steps:
      - name: Checkout fixed main source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: modules/open-design/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Validate fixed release authority
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(uname -m)" = "arm64"
          test -n "$KEY_ID"
          test -n "$KEY_ACTIVE_FROM"
          test -n "$KEY_ACTIVE_UNTIL"
          test "$HOST_VERSION_RANGE" = ">=0.12.0"
          [[ "$RC_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          git merge-base --is-ancestor "$RC_SOURCE_SHA" "$GITHUB_SHA"
          test "$RELEASE_TAG" = "open-design-v$MODULE_VERSION"
          case "$RELEASE_TRACK" in
            prerelease)
              test "$MODULE_VERSION" = "0.14.6-rc.1"
              test "$RELEASE_TAG" = "open-design-v0.14.6-rc.1"
              test "$GITHUB_SHA" = "$RC_SOURCE_SHA"
              test -z "$STABLE_CHANNEL_CONFIRMATION"
              test -z "$ACCEPTANCE_RUN_ID"
              test -z "$ROLLBACK_GATE_RUN_ID"
              ;;
            stable)
              test "$MODULE_VERSION" = "0.14.6"
              test "$RELEASE_TAG" = "open-design-v0.14.6"
              test "$STABLE_CHANNEL_CONFIRMATION" = "PROMOTE_OPEN_DESIGN_0_14_6"
              [[ "$ACCEPTANCE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
              [[ "$ROLLBACK_GATE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
              ;;
            *) exit 1 ;;
          esac

      - name: Install exact publisher dependencies
        run: |
          bun install --frozen-lockfile --ignore-scripts
          npm ci --ignore-scripts --prefix modules/open-design

      - name: Download and validate sealed initial input
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          umask 077
          [[ "$SOURCE_RUN_ID" =~ ^[1-9][0-9]*$ ]] || { echo "source_run_id must be a positive run ID"; exit 1; }
          run_json=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$SOURCE_RUN_ID")
          test "$(jq -r .conclusion <<<"$run_json")" = "success"
          test "$(jq -r .head_branch <<<"$run_json")" = "main"
          test "$(jq -r .head_sha <<<"$run_json")" = "$GITHUB_SHA"
          test "$(jq -r .repository.full_name <<<"$run_json")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$(jq -r .path <<<"$run_json")" = ".github/workflows/open-design-production-input.yml"
          case "$(jq -r .event <<<"$run_json")" in
            push|workflow_dispatch) ;;
            *) echo "source_run_id must identify the fixed production-input workflow"; exit 1 ;;
          esac

          work="$RUNNER_TEMP/open-design-initial"
          download="$work/download"
          mkdir -m 700 -p "$download"
          gh run download "$SOURCE_RUN_ID" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --name open-design-production-input \
            --dir "$download"
          test "$(find "$download" -maxdepth 1 -type f | wc -l | tr -d ' ')" = "2"
          test -f "$download/open-design-production-input.tar.gz"
          test -f "$download/SHA256SUMS"
          test "$(wc -l < "$download/SHA256SUMS" | tr -d ' ')" = "1"
          grep -Eq '^[0-9a-f]{64}  open-design-production-input\.tar\.gz$' "$download/SHA256SUMS"
          (cd "$download" && shasum -a 256 -c SHA256SUMS)

          tar -tzf "$download/open-design-production-input.tar.gz" > "$work/archive-paths.txt"
          while IFS= read -r member; do
            case "$member" in
              open-design-production-input/*) ;;
              *) echo "Unexpected initial-input archive path"; exit 1 ;;
            esac
            [[ "$member" != /* && "$member" != *"../"* && "$member" != *"/.." ]] || exit 1
          done < "$work/archive-paths.txt"
          if tar -tvzf "$download/open-design-production-input.tar.gz" | awk '$1 ~ /^[lh]/ { found=1 } END { exit found ? 0 : 1 }'; then
            echo "Initial-input archive must not contain links"
            exit 1
          fi
          tar -xzf "$download/open-design-production-input.tar.gz" -C "$work"
          input="$work/open-design-production-input"
          test -d "$input/staging"
          test -x "$input/node/bin/node"
          test -f "$input/node/LICENSE"
          printf 'INITIAL_INPUT=%s\nINITIAL_OUTPUT=%s\nPUBLIC_KEY_FILE=%s\n' \
            "$input" "$work/output" "$work/release-public.pem" >> "$GITHUB_ENV"

      - name: Download exact current 0.14.5 trust baseline
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          baseline_state=$(gh release view "$LKG_RELEASE_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,assets)
          test "$(jq -r .tagName <<<"$baseline_state")" = "$LKG_RELEASE_TAG"
          test "$(jq -r .isDraft <<<"$baseline_state")" = false
          test "$(jq -r .isPrerelease <<<"$baseline_state")" = false
          expected=$(printf '%s\n' \
            "$LKG_ARCHIVE_ASSET" \
            "$LKG_CATALOG_ASSET" \
            "$LKG_ENVELOPE_ASSET" \
            "$CONFIG_ASSET" \
            "$LKG_METADATA_ASSET" | LC_ALL=C sort)
          actual=$(jq -r '.assets[].name' <<<"$baseline_state" | LC_ALL=C sort)
          test "$actual" = "$expected"

          baseline="$RUNNER_TEMP/open-design-initial/prior/lkg"
          mkdir -m 700 -p "$baseline"
          gh release download "$LKG_RELEASE_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --dir "$baseline"
          test "$(find "$baseline" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 5
          for asset in \
            "$LKG_ARCHIVE_ASSET" \
            "$LKG_CATALOG_ASSET" \
            "$LKG_ENVELOPE_ASSET" \
            "$CONFIG_ASSET" \
            "$LKG_METADATA_ASSET"; do
            test -f "$baseline/$asset"
            chmod 600 "$baseline/$asset"
          done
          printf 'BASELINE_BUNDLE=%s\n' "$baseline" >> "$GITHUB_ENV"

      - name: Validate stable acceptance, rollback, and RC closure
        if: ${{ env.RELEASE_TRACK == 'stable' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          evidence_root="$RUNNER_TEMP/open-design-initial/stable-evidence"
          acceptance="$evidence_root/acceptance"
          rollback="$evidence_root/rollback"
          rc="$evidence_root/rc"
          mkdir -m 700 -p "$acceptance" "$rollback" "$rc"

          git fetch --no-tags origin "+refs/tags/$RC_RELEASE_TAG:refs/tags/$RC_RELEASE_TAG"
          test "$(git rev-parse "refs/tags/$RC_RELEASE_TAG^{commit}")" = "$RC_SOURCE_SHA"
          git merge-base --is-ancestor "$RC_SOURCE_SHA" "$GITHUB_SHA"

          acceptance_run=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$ACCEPTANCE_RUN_ID")
          test "$(jq -r .conclusion <<<"$acceptance_run")" = success
          test "$(jq -r .head_branch <<<"$acceptance_run")" = main
          test "$(jq -r .head_sha <<<"$acceptance_run")" = "$GITHUB_SHA"
          test "$(jq -r .repository.full_name <<<"$acceptance_run")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$(jq -r .path <<<"$acceptance_run")" = ".github/workflows/open-design-rc-acceptance.yml"
          test "$(jq -r .event <<<"$acceptance_run")" = workflow_dispatch
          gh run download "$ACCEPTANCE_RUN_ID" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --name open-design-rc-acceptance-evidence \
            --dir "$acceptance"
          test "$(find "$acceptance" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 3
          test -f "$acceptance/open-design-rc-acceptance-evidence.json"
          test -f "$acceptance/open-design-rc-acceptance-intake.json"
          test -f "$acceptance/SHA256SUMS"
          test "$(wc -l < "$acceptance/SHA256SUMS" | tr -d ' ')" = 2
          grep -Eq '^[0-9a-f]{64}  open-design-rc-acceptance-evidence\.json$' "$acceptance/SHA256SUMS"
          grep -Eq '^[0-9a-f]{64}  open-design-rc-acceptance-intake\.json$' "$acceptance/SHA256SUMS"
          (cd "$acceptance" && shasum -a 256 -c SHA256SUMS)
          acceptance_json="$acceptance/open-design-rc-acceptance-evidence.json"
          acceptance_intake="$acceptance/open-design-rc-acceptance-intake.json"
          jq -e --arg repository "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --arg hostHeadSha "$GITHUB_SHA" --arg rcSourceSha "$RC_SOURCE_SHA" '
            keys == ["blackoutTasksPassed","evidenceBundleSha256","hostArtifactName","hostArtifactSha256","hostBuildRunId","hostHeadSha","hostVersion","machineEvidence","newStackConsecutivePassed","oldStackTasksPassed","paidTurns","previewHumanPasses","rcArchiveAsset","rcArchiveSha256","rcCatalogIssuedAt","rcCatalogSequence","rcExtractedManifestSha256","rcSourceSha","rcTag","rcVersion","repository","requiredCiPassed","rollbackExercisePassed","schemaVersion","visualEvidence"] and
            .schemaVersion == 2 and .repository == $repository and
            .hostHeadSha == $hostHeadSha and .rcSourceSha == $rcSourceSha and
            .hostVersion == "0.12.0" and .rcVersion == "0.14.6-rc.1" and
            .hostArtifactName == "Simulator-arm64.dmg" and
            (.hostArtifactSha256 | test("^[0-9a-f]{64}$")) and
            (.hostBuildRunId | type == "number" and . >= 1 and . <= 9007199254740991 and floor == .) and
            .rcTag == "open-design-v0.14.6-rc.1" and
            .rcArchiveAsset == "org.simulator.open-design-0.14.6-rc.1-darwin-arm64.tar.gz" and
            (.rcArchiveSha256 | test("^[0-9a-f]{64}$")) and
            (.rcCatalogSequence | type == "number" and . >= 1 and . <= 9007199254740991 and floor == .) and
            (.rcCatalogIssuedAt | type == "string" and test("^[0-9]{4}-(0[1-9]|1[0-2])-([0-2][0-9]|3[01])T([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\\.[0-9]{3}Z$")) and
            (.rcExtractedManifestSha256 | test("^[0-9a-f]{64}$")) and
            .oldStackTasksPassed == 20 and .newStackConsecutivePassed == 20 and
            .blackoutTasksPassed == 20 and .previewHumanPasses == 20 and .paidTurns == 40 and
            .rollbackExercisePassed == true and .requiredCiPassed == true
          ' "$acceptance_json" >/dev/null
          accepted_evidence_bundle_sha=$(shasum -a 256 "$acceptance_intake" | awk '{print $1}')
          test "$accepted_evidence_bundle_sha" = "$(jq -er .evidenceBundleSha256 "$acceptance_json")"
          jq -e --slurpfile intake "$acceptance_intake" '
            .machineEvidence == $intake[0].evidence.machineBatch and
            .visualEvidence == $intake[0].evidence.visualDecisions
          ' "$acceptance_json" >/dev/null
          accepted_rc_sha=$(jq -r .rcArchiveSha256 "$acceptance_json")
          accepted_rc_sequence=$(jq -r .rcCatalogSequence "$acceptance_json")
          accepted_rc_issued_at=$(jq -r .rcCatalogIssuedAt "$acceptance_json")
          accepted_host_artifact_name=$(jq -r .hostArtifactName "$acceptance_json")
          accepted_host_artifact_sha=$(jq -r .hostArtifactSha256 "$acceptance_json")
          accepted_host_build_run_id=$(jq -r .hostBuildRunId "$acceptance_json")
          accepted_machine_evidence=$(jq -c .machineEvidence "$acceptance_json")
          accepted_visual_evidence=$(jq -c .visualEvidence "$acceptance_json")

          host_run=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$accepted_host_build_run_id")
          test "$(jq -r .conclusion <<<"$host_run")" = success
          test "$(jq -r .head_branch <<<"$host_run")" = main
          test "$(jq -r .head_sha <<<"$host_run")" = "$GITHUB_SHA"
          test "$(jq -r .repository.full_name <<<"$host_run")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$(jq -r .path <<<"$host_run")" = ".github/workflows/engineering-rc.yml"
          test "$(jq -r .event <<<"$host_run")" = workflow_dispatch

          rollback_run=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/actions/runs/$ROLLBACK_GATE_RUN_ID")
          test "$(jq -r .conclusion <<<"$rollback_run")" = success
          test "$(jq -r .head_branch <<<"$rollback_run")" = main
          test "$(jq -r .head_sha <<<"$rollback_run")" = "$GITHUB_SHA"
          test "$(jq -r .repository.full_name <<<"$rollback_run")" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$(jq -r .path <<<"$rollback_run")" = ".github/workflows/open-design-acceptance-rollback.yml"
          test "$(jq -r .event <<<"$rollback_run")" = workflow_dispatch
          gh run download "$ROLLBACK_GATE_RUN_ID" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --name open-design-rollback-gate-evidence \
            --dir "$rollback"
          test "$(find "$rollback" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 2
          test -f "$rollback/open-design-rollback-gate-evidence.json"
          test -f "$rollback/SHA256SUMS"
          test "$(wc -l < "$rollback/SHA256SUMS" | tr -d ' ')" = 1
          grep -Eq '^[0-9a-f]{64}  open-design-rollback-gate-evidence\.json$' "$rollback/SHA256SUMS"
          (cd "$rollback" && shasum -a 256 -c SHA256SUMS)
          jq -e --arg repository "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --arg hostHeadSha "$GITHUB_SHA" --arg rcSourceSha "$RC_SOURCE_SHA" \
            --arg evidenceBundleSha256 "$accepted_evidence_bundle_sha" \
            --argjson machineEvidence "$accepted_machine_evidence" \
            --argjson visualEvidence "$accepted_visual_evidence" \
            --arg hostArtifactName "$accepted_host_artifact_name" \
            --arg hostArtifactSha256 "$accepted_host_artifact_sha" \
            --argjson hostBuildRunId "$accepted_host_build_run_id" \
            --argjson acceptanceRunId "$ACCEPTANCE_RUN_ID" --arg archiveSha "$accepted_rc_sha" \
            --argjson rcCatalogSequence "$accepted_rc_sequence" --arg rcCatalogIssuedAt "$accepted_rc_issued_at" '
            keys == ["acceptanceRunId","evidenceBundleSha256","hostArtifactName","hostArtifactSha256","hostBuildRunId","hostHeadSha","lkgTag","machineEvidence","rcArchiveSha256","rcCatalogIssuedAt","rcCatalogSequence","rcSourceSha","rcTag","repository","schemaVersion","validatedAt","visualEvidence"] and
            .schemaVersion == 2 and .repository == $repository and
            .hostHeadSha == $hostHeadSha and .rcSourceSha == $rcSourceSha and
            .evidenceBundleSha256 == $evidenceBundleSha256 and
            .machineEvidence == $machineEvidence and .visualEvidence == $visualEvidence and
            .hostArtifactName == $hostArtifactName and .hostArtifactSha256 == $hostArtifactSha256 and
            .hostBuildRunId == $hostBuildRunId and
            .acceptanceRunId == $acceptanceRunId and .rcTag == "open-design-v0.14.6-rc.1" and
            .lkgTag == "open-design-v0.14.5" and .rcArchiveSha256 == $archiveSha and
            .rcCatalogSequence == $rcCatalogSequence and .rcCatalogIssuedAt == $rcCatalogIssuedAt and
            (.validatedAt | fromdateiso8601 | type == "number")
          ' "$rollback/open-design-rollback-gate-evidence.json" >/dev/null

          rc_state=$(gh release view "$RC_RELEASE_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,targetCommitish,assets)
          test "$(jq -r .tagName <<<"$rc_state")" = "$RC_RELEASE_TAG"
          test "$(jq -r .isDraft <<<"$rc_state")" = false
          test "$(jq -r .isPrerelease <<<"$rc_state")" = true
          test "$(jq -r .targetCommitish <<<"$rc_state")" = "$RC_SOURCE_SHA"
          expected_rc=$(printf '%s\n' \
            "$RC_ARCHIVE_ASSET" \
            "$RC_CATALOG_ASSET" \
            "$RC_ENVELOPE_ASSET" \
            "$RC_METADATA_ASSET" | LC_ALL=C sort)
          actual_rc=$(jq -r '.assets[].name' <<<"$rc_state" | LC_ALL=C sort)
          test "$actual_rc" = "$expected_rc"
          gh release download "$RC_RELEASE_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --dir "$rc"
          test "$(find "$rc" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 4
          for asset in "$RC_ARCHIVE_ASSET" "$RC_CATALOG_ASSET" "$RC_ENVELOPE_ASSET" "$RC_METADATA_ASSET"; do
            test -f "$rc/$asset"
            chmod 600 "$rc/$asset"
          done
          test "$(shasum -a 256 "$rc/$RC_ARCHIVE_ASSET" | awk '{print $1}')" = "$accepted_rc_sha"
          printf 'ACCEPTED_RC_ARCHIVE_SHA256=%s\nACCEPTED_RC_CATALOG_SEQUENCE=%s\nACCEPTED_RC_CATALOG_ISSUED_AT=%s\nRC_PUBLIC_BUNDLE=%s\n' \
            "$accepted_rc_sha" "$accepted_rc_sequence" "$accepted_rc_issued_at" "$rc" >> "$GITHUB_ENV"

      - name: Authenticate prior state, dry-run, and build signed initial assets
        shell: bash
        env:
          OPEN_DESIGN_RELEASE_PRIVATE_KEY: ${{ secrets.OPEN_DESIGN_RELEASE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          set +x
          umask 077
          test -n "$OPEN_DESIGN_RELEASE_PRIVATE_KEY"

          # Derive the public authority before trusting any release state or
          # signing the candidate. The private key never leaves this step.
          node --input-type=module <<'NODE'
          import { createPrivateKey, createPublicKey } from "node:crypto";
          import { writeFileSync } from "node:fs";
          const privateKey = createPrivateKey({ key: process.env.OPEN_DESIGN_RELEASE_PRIVATE_KEY, format: "pem" });
          const publicKey = createPublicKey(privateKey).export({ format: "pem", type: "spki" });
          writeFileSync(process.env.PUBLIC_KEY_FILE, publicKey, { mode: 0o600, flag: "wx" });
          NODE

          state_root="$RUNNER_TEMP/open-design-initial/state"
          mkdir -m 700 "$state_root"

          read_catalog_candidate() {
            local catalog_path=$1
            local output_path=$2
            CATALOG_PATH="$catalog_path" CANDIDATE_OUTPUT="$output_path" node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const catalog = JSON.parse(readFileSync(process.env.CATALOG_PATH, "utf8"));
          const sequence = catalog?.sequence;
          const issuedAt = catalog?.issuedAt;
          const issuedAtMs = Date.parse(issuedAt);
          if (!Number.isSafeInteger(sequence) || sequence < 1) throw new Error("Catalog sequence is not a positive safe integer");
          if (typeof issuedAt !== "string" || !Number.isFinite(issuedAtMs) || new Date(issuedAtMs).toISOString() !== issuedAt) {
            throw new Error("Catalog issuedAt is not canonical ISO-8601");
          }
          writeFileSync(process.env.CANDIDATE_OUTPUT,
            `CANDIDATE_SEQUENCE=${sequence}\nCANDIDATE_ISSUED_AT=${issuedAt}\nCANDIDATE_VERIFICATION_TIME_MS=${issuedAtMs + 1000}\n`,
            { mode: 0o600, flag: "wx" });
          NODE
          }

          baseline_candidate="$state_root/baseline-candidate.env"
          read_catalog_candidate "$BASELINE_BUNDLE/$LKG_CATALOG_ASSET" "$baseline_candidate"
          # The candidate file contains only validated decimal/ISO values.
          source "$baseline_candidate"
          node modules/open-design/package/production-cli.mjs \
            --module-version "$LKG_MODULE_VERSION" \
            --verify \
            --bundle-root "$BASELINE_BUNDLE" \
            --release-tag "$LKG_RELEASE_TAG" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --public-key-file "$PUBLIC_KEY_FILE" \
            --previous-sequence 0 \
            --verification-time "$CANDIDATE_VERIFICATION_TIME_MS" > "$state_root/baseline-verify.json"
          jq -e --argjson sequence "$CANDIDATE_SEQUENCE" --arg issuedAt "$CANDIDATE_ISSUED_AT" '
            .ok == true and
            .version == "0.14.5" and
            .catalogState.highestSequence == $sequence and
            .catalogState.latestIssuedAt == $issuedAt
          ' "$state_root/baseline-verify.json" >/dev/null
          BASELINE_SEQUENCE=$CANDIDATE_SEQUENCE
          BASELINE_ISSUED_AT=$CANDIDATE_ISSUED_AT
          export BASELINE_SEQUENCE BASELINE_ISSUED_AT

          if [[ "$RELEASE_TRACK" = stable ]]; then
            rc_verify="$RUNNER_TEMP/open-design-initial/stable-evidence/rc-verify"
            mkdir -m 700 "$rc_verify"
            for asset in "$RC_ARCHIVE_ASSET" "$RC_CATALOG_ASSET" "$RC_ENVELOPE_ASSET" "$RC_METADATA_ASSET"; do
              cp "$RC_PUBLIC_BUNDLE/$asset" "$rc_verify/$asset"
              chmod 600 "$rc_verify/$asset"
            done
            RC_VERIFY_BUNDLE="$rc_verify" node --input-type=module <<'NODE'
          import { createPublicKey } from "node:crypto";
          import { readFileSync, writeFileSync } from "node:fs";
          import { join } from "node:path";
          import { encodeCanonicalCatalog } from "@simulator/module-release-trust";
          const publicJwk = createPublicKey(readFileSync(process.env.PUBLIC_KEY_FILE)).export({ format: "jwk" });
          if (publicJwk.kty !== "OKP" || publicJwk.crv !== "Ed25519" || typeof publicJwk.x !== "string") {
            throw new Error("Derived public key is not Ed25519");
          }
          const official = {
            schemaVersion: 1,
            moduleId: "org.simulator.open-design",
            version: process.env.RC_MODULE_VERSION,
            platform: "darwin-arm64",
            catalogUrl: `https://github.com/${process.env.RELEASE_OWNER}/${process.env.RELEASE_REPOSITORY}/releases/download/${process.env.RC_RELEASE_TAG}/${process.env.RC_ENVELOPE_ASSET}`,
            githubRelease: {
              owner: process.env.RELEASE_OWNER,
              repository: process.env.RELEASE_REPOSITORY,
              tag: process.env.RC_RELEASE_TAG,
            },
            trustedKeys: [{
              keyId: process.env.KEY_ID,
              publicKey: Buffer.from(publicJwk.x, "base64url").toString("base64"),
              activeFrom: process.env.KEY_ACTIVE_FROM,
              activeUntil: process.env.KEY_ACTIVE_UNTIL,
            }],
          };
          writeFileSync(join(process.env.RC_VERIFY_BUNDLE, "open-design-official-channel.json"), encodeCanonicalCatalog(official), {
            mode: 0o600,
            flag: "wx",
          });
          NODE

            rc_candidate="$state_root/rc-candidate.env"
            read_catalog_candidate "$rc_verify/$RC_CATALOG_ASSET" "$rc_candidate"
            unset CANDIDATE_SEQUENCE CANDIDATE_ISSUED_AT CANDIDATE_VERIFICATION_TIME_MS
            source "$rc_candidate"
            node modules/open-design/package/production-cli.mjs \
              --module-version "$RC_MODULE_VERSION" \
              --verify \
              --bundle-root "$rc_verify" \
              --release-tag "$RC_RELEASE_TAG" \
              --key-id "$KEY_ID" \
              --key-active-from "$KEY_ACTIVE_FROM" \
              --key-active-until "$KEY_ACTIVE_UNTIL" \
              --public-key-file "$PUBLIC_KEY_FILE" \
              --previous-sequence "$BASELINE_SEQUENCE" \
              --previous-issued-at "$BASELINE_ISSUED_AT" \
              --verification-time "$CANDIDATE_VERIFICATION_TIME_MS" > "$state_root/rc-verify.json"
            jq -e \
              --argjson sequence "$ACCEPTED_RC_CATALOG_SEQUENCE" \
              --arg issuedAt "$ACCEPTED_RC_CATALOG_ISSUED_AT" \
              --arg archiveSha "$ACCEPTED_RC_ARCHIVE_SHA256" \
              --arg extractedSha "$(jq -r .rcExtractedManifestSha256 "$RUNNER_TEMP/open-design-initial/stable-evidence/acceptance/open-design-rc-acceptance-evidence.json")" '
              .ok == true and
              .version == "0.14.6-rc.1" and
              .catalogState.highestSequence == $sequence and
              .catalogState.latestIssuedAt == $issuedAt and
              .archiveSha256 == $archiveSha and
              .extractedManifestSha256 == $extractedSha
            ' "$state_root/rc-verify.json" >/dev/null
            test "$CANDIDATE_SEQUENCE" = "$ACCEPTED_RC_CATALOG_SEQUENCE"
            test "$CANDIDATE_ISSUED_AT" = "$ACCEPTED_RC_CATALOG_ISSUED_AT"
            RC_SEQUENCE=$CANDIDATE_SEQUENCE
            RC_ISSUED_AT=$CANDIDATE_ISSUED_AT
            export RC_SEQUENCE RC_ISSUED_AT
          fi

          derived_state="$state_root/derived-state.env"
          DERIVED_STATE_OUTPUT="$derived_state" node --input-type=module <<'NODE'
          import { writeFileSync } from "node:fs";
          const parseSequence = (value, label) => {
            if (!/^(?:0|[1-9][0-9]*)$/.test(value ?? "")) throw new Error(`${label} is not decimal`);
            const sequence = Number(value);
            if (!Number.isSafeInteger(sequence) || sequence < 1) throw new Error(`${label} is not a positive safe integer`);
            return sequence;
          };
          const parseTimestamp = (value, label) => {
            const milliseconds = Date.parse(value ?? "");
            if (!Number.isFinite(milliseconds) || new Date(milliseconds).toISOString() !== value) throw new Error(`${label} is not canonical`);
            return milliseconds;
          };
          const sequences = [parseSequence(process.env.BASELINE_SEQUENCE, "baseline sequence")];
          const issuedAtValues = [parseTimestamp(process.env.BASELINE_ISSUED_AT, "baseline issuedAt")];
          if (process.env.RELEASE_TRACK === "stable") {
            sequences.push(parseSequence(process.env.RC_SEQUENCE, "RC sequence"));
            issuedAtValues.push(parseTimestamp(process.env.RC_ISSUED_AT, "RC issuedAt"));
          } else if (process.env.RELEASE_TRACK !== "prerelease") {
            throw new Error("Unknown release track");
          }
          const priorSequence = Math.max(...sequences);
          if (priorSequence >= Number.MAX_SAFE_INTEGER) throw new Error("Catalog sequence exhausted");
          const priorIssuedAtMs = Math.max(...issuedAtValues);
          const issuedAtMs = Math.max(Date.now(), priorIssuedAtMs + 1000);
          const sequence = priorSequence + 1;
          const issuedAt = new Date(issuedAtMs).toISOString();
          const expiresAt = new Date(issuedAtMs + 20 * 60 * 60 * 1000).toISOString();
          writeFileSync(process.env.DERIVED_STATE_OUTPUT,
            `PRIOR_SEQUENCE=${priorSequence}\nPRIOR_ISSUED_AT=${new Date(priorIssuedAtMs).toISOString()}\nCATALOG_SEQUENCE=${sequence}\nCATALOG_ISSUED_AT=${issuedAt}\nCATALOG_EXPIRES_AT=${expiresAt}\nVERIFICATION_TIME_MS=${issuedAtMs + 1000}\n`,
            { mode: 0o600, flag: "wx" });
          NODE
          source "$derived_state"
          cat "$derived_state" >> "$GITHUB_ENV"

          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --dry-run \
            --staging-root "$INITIAL_INPUT/staging" \
            --node-bin "$INITIAL_INPUT/node/bin/node" \
            --node-license "$INITIAL_INPUT/node/LICENSE" \
            --release-tag "$RELEASE_TAG" \
            --catalog-sequence "$CATALOG_SEQUENCE" \
            --catalog-issued-at "$CATALOG_ISSUED_AT" \
            --catalog-expires-at "$CATALOG_EXPIRES_AT" \
            --host-version-range "$HOST_VERSION_RANGE" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --previous-sequence "$PRIOR_SEQUENCE" \
            --previous-issued-at "$PRIOR_ISSUED_AT" \
            --verification-time "$VERIFICATION_TIME_MS" > "$RUNNER_TEMP/open-design-initial-dry-run.json"

          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --staging-root "$INITIAL_INPUT/staging" \
            --node-bin "$INITIAL_INPUT/node/bin/node" \
            --node-license "$INITIAL_INPUT/node/LICENSE" \
            --output "$INITIAL_OUTPUT" \
            --release-tag "$RELEASE_TAG" \
            --catalog-sequence "$CATALOG_SEQUENCE" \
            --catalog-issued-at "$CATALOG_ISSUED_AT" \
            --catalog-expires-at "$CATALOG_EXPIRES_AT" \
            --host-version-range "$HOST_VERSION_RANGE" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --previous-sequence "$PRIOR_SEQUENCE" \
            --previous-issued-at "$PRIOR_ISSUED_AT" \
            --verification-time "$VERIFICATION_TIME_MS" \
            --private-key-env OPEN_DESIGN_RELEASE_PRIVATE_KEY > "$RUNNER_TEMP/open-design-initial-build.json"

      - name: Verify initial bundle before publication
        shell: bash
        run: |
          set -euo pipefail
          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --verify \
            --bundle-root "$INITIAL_OUTPUT" \
            --release-tag "$RELEASE_TAG" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --public-key-file "$PUBLIC_KEY_FILE" \
            --previous-sequence "$PRIOR_SEQUENCE" \
            --previous-issued-at "$PRIOR_ISSUED_AT" \
            --verification-time "$VERIFICATION_TIME_MS" > "$RUNNER_TEMP/open-design-initial-verify.json"
          jq -e --argjson sequence "$CATALOG_SEQUENCE" --arg issuedAt "$CATALOG_ISSUED_AT" '
            .ok == true and
            .catalogState.highestSequence == $sequence and
            .catalogState.latestIssuedAt == $issuedAt
          ' "$RUNNER_TEMP/open-design-initial-verify.json" >/dev/null
          expected=$(printf '%s\n' "$ARCHIVE_ASSET" "$CATALOG_ASSET" "$ENVELOPE_ASSET" "$CONFIG_ASSET" "$METADATA_ASSET" | LC_ALL=C sort)
          actual=$(find "$INITIAL_OUTPUT" -maxdepth 1 -type f -exec basename {} \; | LC_ALL=C sort)
          test "$actual" = "$expected"
          if [[ "$RELEASE_TRACK" = stable ]]; then
            test "$(shasum -a 256 "$INITIAL_OUTPUT/$ARCHIVE_ASSET" | awk '{print $1}')" = "$ACCEPTED_RC_ARCHIVE_SHA256"
          fi

      - name: Publish fixed-tag release through a draft transaction
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          if gh release view "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" >/dev/null 2>&1; then
            echo "Fixed OpenDesign release already exists"
            exit 1
          fi
          if git ls-remote --exit-code origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Fixed OpenDesign tag already exists"
            exit 1
          fi
          cleanup_required=1
          cleanup() {
            status=$?
            if [[ "$cleanup_required" = 1 ]]; then
              gh release delete "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --cleanup-tag --yes >/dev/null 2>&1 || true
            fi
            exit "$status"
          }
          trap cleanup EXIT
          release_flags=(--draft)
          publish_assets=(
            "$INITIAL_OUTPUT/$ARCHIVE_ASSET"
            "$INITIAL_OUTPUT/$CATALOG_ASSET"
            "$INITIAL_OUTPUT/$ENVELOPE_ASSET"
            "$INITIAL_OUTPUT/$METADATA_ASSET"
          )
          if [[ "$RELEASE_TRACK" = prerelease ]]; then
            release_flags+=(--prerelease)
          else
            publish_assets+=("$INITIAL_OUTPUT/$CONFIG_ASSET")
          fi
          gh release create "$RELEASE_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "OpenDesign v$MODULE_VERSION" \
            --notes "Simulator OpenDesign $RELEASE_TRACK module assets." \
            "${release_flags[@]}" \
            "${publish_assets[@]}"

          expected_assets=("$ARCHIVE_ASSET" "$CATALOG_ASSET" "$ENVELOPE_ASSET" "$METADATA_ASSET")
          [[ "$RELEASE_TRACK" = prerelease ]] || expected_assets+=("$CONFIG_ASSET")
          expected=$(printf '%s\n' "${expected_assets[@]}" | LC_ALL=C sort)
          release_state=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --json tagName,isDraft,isPrerelease,assets)
          test "$(jq -r .tagName <<<"$release_state")" = "$RELEASE_TAG"
          test "$(jq -r .isDraft <<<"$release_state")" = true
          if [[ "$RELEASE_TRACK" = prerelease ]]; then
            test "$(jq -r .isPrerelease <<<"$release_state")" = true
          else
            test "$(jq -r .isPrerelease <<<"$release_state")" = false
          fi
          actual=$(jq -r '.assets[].name' <<<"$release_state" | LC_ALL=C sort)
          test "$actual" = "$expected"
          remote="$RUNNER_TEMP/open-design-initial-remote"
          mkdir -m 700 "$remote"
          gh release download "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --dir "$remote"
          for asset in "${expected_assets[@]}"; do
            cmp "$INITIAL_OUTPUT/$asset" "$remote/$asset"
          done
          gh release edit "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --draft=false
          published_state=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --json isDraft,isPrerelease)
          test "$(jq -r .isDraft <<<"$published_state")" = false
          if [[ "$RELEASE_TRACK" = prerelease ]]; then
            test "$(jq -r .isPrerelease <<<"$published_state")" = true
          else
            test "$(jq -r .isPrerelease <<<"$published_state")" = false
          fi
          cleanup_required=0
          trap - EXIT

      - name: Remove transient verification material
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -d "$RUNNER_TEMP/open-design-initial" ]]; then
            chmod -R u+rwX "$RUNNER_TEMP/open-design-initial"
          fi
          rm -rf "$RUNNER_TEMP/open-design-initial" "$RUNNER_TEMP/open-design-initial-"*.json

  refresh:
    name: Refresh OpenDesign catalog
    if: >-
      github.repository == 'Jiachi-Deng/Simulator' &&
      github.ref == 'refs/heads/main' &&
      vars.OPEN_DESIGN_RC_ACCEPTANCE_ENABLED != 'true' &&
      ((github.event_name == 'schedule' && vars.OPEN_DESIGN_RELEASE_ENABLED == 'true') ||
       (github.event_name == 'workflow_dispatch' && inputs.operation == 'refresh' &&
        ((inputs.release_track == 'stable' && vars.OPEN_DESIGN_RELEASE_ENABLED == 'true') ||
         (inputs.release_track == 'prerelease' && vars.OPEN_DESIGN_PRERELEASE_ENABLED == 'true'))))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_track == 'prerelease' && 'open-design-prerelease' || 'open-design-production' }}
      url: https://github.com/Jiachi-Deng/Simulator/releases
    env:
      DISPATCH_OPERATION: ${{ inputs.operation }}
      DISPATCH_RELEASE_TRACK: ${{ inputs.release_track }}
      DISPATCH_MODULE_VERSION: ${{ inputs.module_version }}
      DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
      STABLE_CHANNEL_CONFIRMATION: ${{ inputs.stable_channel_confirmation }}
      REFRESH_TRACK: ${{ github.event_name == 'schedule' && 'stable' || inputs.release_track }}
      RC_SOURCE_SHA: 6b39a9bcc0f158645897976e23f334c5cab771f4
      SOURCE_AUTHORITY_CONFIG: apps/electron/resources/open-design-official-channel.json
      KEY_ID: ${{ vars.OPEN_DESIGN_RELEASE_KEY_ID }}
      KEY_ACTIVE_FROM: ${{ vars.OPEN_DESIGN_RELEASE_KEY_ACTIVE_FROM }}
      KEY_ACTIVE_UNTIL: ${{ vars.OPEN_DESIGN_RELEASE_KEY_ACTIVE_UNTIL }}

    steps:
      - name: Checkout fixed main source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
          cache-dependency-path: modules/open-design/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.10"

      - name: Resolve exact refresh target
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          selected_version=""
          release_track=""
          expected_prerelease=""
          config_required=""
          expected_host_version_range=""
          release_state=""
          release_pages=$(gh api --paginate --slurp \
            "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases?per_page=100")
          jq -e 'type == "array" and all(.[]; type == "array")' <<<"$release_pages" >/dev/null

          resolve_stable() {
            # Newest-first fixed support matrix. A present but invalid candidate
            # exits immediately; only an actually absent 0.14.6 falls back.
            candidate_versions=("0.14.6" "0.14.5")
            for version in "${candidate_versions[@]}"; do
              tag="open-design-v$version"
              matching_count=$(jq --arg tag "$tag" '[.[][] | select(.tag_name == $tag)] | length' <<<"$release_pages")
              if [[ "$matching_count" = 0 ]]; then continue; fi
              test "$matching_count" = 1
              release_state=$(jq -c --arg tag "$tag" '
                [.[][] | select(.tag_name == $tag)][0] |
                {tagName: .tag_name, isDraft: .draft, isPrerelease: .prerelease, targetCommitish: .target_commitish, assets}
              ' <<<"$release_pages")
              test "$(jq -r .tagName <<<"$release_state")" = "$tag"
              test "$(jq -r .isDraft <<<"$release_state")" = false
              test "$(jq -r .isPrerelease <<<"$release_state")" = false
              selected_version="$version"
              release_track="stable"
              expected_prerelease="false"
              config_required="true"
              case "$version" in
                0.14.6) expected_host_version_range=">=0.12.0" ;;
                0.14.5) expected_host_version_range=">=0.11.1 <0.12.0" ;;
                *) exit 1 ;;
              esac
              return
            done
          }

          case "$GITHUB_EVENT_NAME" in
            schedule)
              test -z "$DISPATCH_OPERATION"
              test -z "$DISPATCH_RELEASE_TRACK"
              test -z "$DISPATCH_MODULE_VERSION"
              test -z "$DISPATCH_RELEASE_TAG"
              test -z "$STABLE_CHANNEL_CONFIRMATION"
              resolve_stable
              ;;
            workflow_dispatch)
              test "$DISPATCH_OPERATION" = refresh
              case "$DISPATCH_RELEASE_TRACK" in
                prerelease)
                  stable_matching_count=$(jq '[.[][] | select(.tag_name == "open-design-v0.14.6")] | length' <<<"$release_pages")
                  test "$stable_matching_count" = 0
                  lkg_assets=(
                    org.simulator.open-design-0.14.5-darwin-arm64.tar.gz
                    org.simulator.open-design-0.14.5-catalog-v2.json
                    org.simulator.open-design-0.14.5-catalog-v2-envelope.json
                    open-design-official-channel.json
                    org.simulator.open-design-0.14.5-release-metadata.json
                  )
                  lkg_matching_count=$(jq '[.[][] | select(.tag_name == "open-design-v0.14.5")] | length' <<<"$release_pages")
                  test "$lkg_matching_count" = 1
                  lkg_state=$(jq -c '
                    [.[][] | select(.tag_name == "open-design-v0.14.5")][0] |
                    {tagName: .tag_name, isDraft: .draft, isPrerelease: .prerelease, assets}
                  ' <<<"$release_pages")
                  test "$(jq -r .tagName <<<"$lkg_state")" = "open-design-v0.14.5"
                  test "$(jq -r .isDraft <<<"$lkg_state")" = false
                  test "$(jq -r .isPrerelease <<<"$lkg_state")" = false
                  test "$(jq -r '.assets[].name' <<<"$lkg_state" | LC_ALL=C sort)" = \
                    "$(printf '%s\n' "${lkg_assets[@]}" | LC_ALL=C sort)"
                  selected_version="0.14.6-rc.1"
                  release_track="prerelease"
                  expected_prerelease="true"
                  config_required="false"
                  expected_host_version_range=">=0.12.0"
                  matching_count=$(jq --arg tag "open-design-v0.14.6-rc.1" '[.[][] | select(.tag_name == $tag)] | length' <<<"$release_pages")
                  test "$matching_count" = 1
                  release_state=$(jq -c --arg tag "open-design-v0.14.6-rc.1" '
                    [.[][] | select(.tag_name == $tag)][0] |
                    {tagName: .tag_name, isDraft: .draft, isPrerelease: .prerelease, targetCommitish: .target_commitish, assets}
                  ' <<<"$release_pages")
                  test "$(jq -r .targetCommitish <<<"$release_state")" = "$RC_SOURCE_SHA"
                  ;;
                stable) resolve_stable ;;
                *) exit 1 ;;
              esac
              ;;
            *) exit 1 ;;
          esac
          test -n "$selected_version"
          test -n "$release_state"
          release_tag="open-design-v$selected_version"
          archive="org.simulator.open-design-$selected_version-darwin-arm64.tar.gz"
          catalog="org.simulator.open-design-$selected_version-catalog-v2.json"
          envelope="org.simulator.open-design-$selected_version-catalog-v2-envelope.json"
          config="open-design-official-channel.json"
          metadata="org.simulator.open-design-$selected_version-release-metadata.json"
          expected_assets=("$archive" "$catalog" "$envelope" "$metadata")
          [[ "$config_required" = false ]] || expected_assets+=("$config")
          expected=$(printf '%s\n' "${expected_assets[@]}" | LC_ALL=C sort)
          actual=$(jq -r '.assets[].name' <<<"$release_state" | LC_ALL=C sort)
          test "$(jq -r .tagName <<<"$release_state")" = "$release_tag"
          test "$(jq -r .isDraft <<<"$release_state")" = false
          test "$(jq -r .isPrerelease <<<"$release_state")" = "$expected_prerelease"
          test "$actual" = "$expected"
          {
            printf 'RELEASE_TRACK=%s\n' "$release_track"
            printf 'RELEASE_TAG=%s\n' "$release_tag"
            printf 'MODULE_VERSION=%s\n' "$selected_version"
            printf 'ARCHIVE_ASSET=%s\n' "$archive"
            printf 'CATALOG_ASSET=%s\n' "$catalog"
            printf 'ENVELOPE_ASSET=%s\n' "$envelope"
            printf 'CONFIG_ASSET=%s\n' "$config"
            printf 'METADATA_ASSET=%s\n' "$metadata"
            printf 'EXPECTED_PRERELEASE=%s\n' "$expected_prerelease"
            printf 'CONFIG_REQUIRED=%s\n' "$config_required"
            printf 'PUBLIC_ASSET_COUNT=%s\n' "${#expected_assets[@]}"
            printf 'EXPECTED_HOST_VERSION_RANGE=%s\n' "$expected_host_version_range"
            printf 'RELEASE_TARGET_COMMITISH=%s\n' "$(jq -r .targetCommitish <<<"$release_state")"
          } >> "$GITHUB_ENV"

      - name: Validate fixed refresh authority
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "$RELEASE_OWNER/$RELEASE_REPOSITORY"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test -n "$KEY_ID"
          test -n "$KEY_ACTIVE_FROM"
          test -n "$KEY_ACTIVE_UNTIL"
          test "$RELEASE_TAG" = "open-design-v$MODULE_VERSION"
          case "$GITHUB_EVENT_NAME" in
            schedule)
              test "$RELEASE_TRACK" = stable
              test "$EXPECTED_PRERELEASE" = false
              test "$CONFIG_REQUIRED" = true
              test "$PUBLIC_ASSET_COUNT" = 5
              case "$MODULE_VERSION:$EXPECTED_HOST_VERSION_RANGE" in
                "0.14.6:>=0.12.0"|"0.14.5:>=0.11.1 <0.12.0") ;;
                *) exit 1 ;;
              esac
              ;;
            workflow_dispatch)
              test "$DISPATCH_OPERATION" = refresh
              test "$DISPATCH_RELEASE_TRACK" = "$RELEASE_TRACK"
              test "$DISPATCH_MODULE_VERSION" = "$MODULE_VERSION"
              test "$DISPATCH_RELEASE_TAG" = "$RELEASE_TAG"
              case "$RELEASE_TRACK" in
                prerelease)
                  test "$MODULE_VERSION" = "0.14.6-rc.1"
                  test "$RELEASE_TAG" = "open-design-v0.14.6-rc.1"
                  test "$EXPECTED_PRERELEASE" = true
                  test "$CONFIG_REQUIRED" = false
                  test "$PUBLIC_ASSET_COUNT" = 4
                  test "$EXPECTED_HOST_VERSION_RANGE" = ">=0.12.0"
                  test "$STABLE_CHANNEL_CONFIRMATION" = "REFRESH_OPEN_DESIGN_0_14_6_RC_1"
                  test "$RELEASE_TARGET_COMMITISH" = "$RC_SOURCE_SHA"
                  [[ "$RC_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
                  git fetch --no-tags origin "+refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
                  test "$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" = "$RC_SOURCE_SHA"
                  git merge-base --is-ancestor "$RC_SOURCE_SHA" "$GITHUB_SHA"
                  ;;
                stable)
                  test "$EXPECTED_PRERELEASE" = false
                  test "$CONFIG_REQUIRED" = true
                  test "$PUBLIC_ASSET_COUNT" = 5
                  expected_confirmation="REFRESH_OPEN_DESIGN_${MODULE_VERSION//./_}"
                  test "$STABLE_CHANNEL_CONFIRMATION" = "$expected_confirmation"
                  ;;
                *) exit 1 ;;
              esac
              ;;
            *) exit 1 ;;
          esac

      - name: Install exact publisher dependencies
        run: |
          bun install --frozen-lockfile --ignore-scripts
          npm ci --ignore-scripts --prefix modules/open-design

      - name: Download exact fixed-tag public bundle
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          release_state=$(gh release view "$RELEASE_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,assets)
          expected_assets=("$ARCHIVE_ASSET" "$CATALOG_ASSET" "$ENVELOPE_ASSET" "$METADATA_ASSET")
          [[ "$CONFIG_REQUIRED" = false ]] || expected_assets+=("$CONFIG_ASSET")
          expected=$(printf '%s\n' "${expected_assets[@]}" | LC_ALL=C sort)
          actual=$(jq -r '.assets[].name' <<<"$release_state" | LC_ALL=C sort)
          test "$(jq -r .tagName <<<"$release_state")" = "$RELEASE_TAG"
          test "$(jq -r .isDraft <<<"$release_state")" = false
          test "$(jq -r .isPrerelease <<<"$release_state")" = "$EXPECTED_PRERELEASE"
          test "$actual" = "$expected"
          work="$RUNNER_TEMP/open-design-refresh"
          source="$work/source"
          mkdir -m 700 -p "$source"
          for asset in "${expected_assets[@]}"; do
            gh release download "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --pattern "$asset" --dir "$source"
            chmod 600 "$source/$asset"
          done
          test "$(find "$source" -maxdepth 1 -type f | wc -l | tr -d ' ')" = "$PUBLIC_ASSET_COUNT"
          source_archive_sha256=$(shasum -a 256 "$source/$ARCHIVE_ASSET" | awk '{print $1}')
          [[ "$source_archive_sha256" =~ ^[0-9a-f]{64}$ ]]
          source_archive_size=$(stat -c %s "$source/$ARCHIVE_ASSET")
          [[ "$source_archive_size" =~ ^[1-9][0-9]*$ ]]
          if [[ "$CONFIG_REQUIRED" = true ]]; then
            refresh_input="$source"
            baseline=""
            authority_config="$source/$CONFIG_ASSET"
          else
            test ! -e "$source/$CONFIG_ASSET"
            refresh_input="$work/private-input"
            test -f "$SOURCE_AUTHORITY_CONFIG"
            baseline="$work/lkg"
            mkdir -m 700 "$baseline"
            lkg_tag="open-design-v0.14.5"
            lkg_assets=(
              org.simulator.open-design-0.14.5-darwin-arm64.tar.gz
              org.simulator.open-design-0.14.5-catalog-v2.json
              org.simulator.open-design-0.14.5-catalog-v2-envelope.json
              open-design-official-channel.json
              org.simulator.open-design-0.14.5-release-metadata.json
            )
            lkg_state=$(gh release view "$lkg_tag" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
              --json tagName,isDraft,isPrerelease,assets)
            test "$(jq -r .tagName <<<"$lkg_state")" = "$lkg_tag"
            test "$(jq -r .isDraft <<<"$lkg_state")" = false
            test "$(jq -r .isPrerelease <<<"$lkg_state")" = false
            test "$(jq -r '.assets[].name' <<<"$lkg_state" | LC_ALL=C sort)" = \
              "$(printf '%s\n' "${lkg_assets[@]}" | LC_ALL=C sort)"
            for asset in "${lkg_assets[@]}"; do
              gh release download "$lkg_tag" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
                --pattern "$asset" --dir "$baseline"
              chmod 600 "$baseline/$asset"
            done
            test "$(find "$baseline" -maxdepth 1 -type f | wc -l | tr -d ' ')" = 5
            cmp "$SOURCE_AUTHORITY_CONFIG" "$baseline/open-design-official-channel.json"
            authority_config="$baseline/open-design-official-channel.json"
          fi
          AUTHORITY_CONFIG="$authority_config" PUBLIC_KEY_FILE="$work/release-public.pem" \
            node --input-type=module <<'NODE'
          import { createPublicKey } from "node:crypto";
          import { readFileSync, writeFileSync } from "node:fs";
          const authority = JSON.parse(readFileSync(process.env.AUTHORITY_CONFIG, "utf8"));
          const trusted = authority?.trustedKeys?.[0];
          const raw = Buffer.from(trusted?.publicKey ?? "", "base64");
          if (authority?.trustedKeys?.length !== 1 || raw.length !== 32 || raw.toString("base64") !== trusted.publicKey) {
            throw new Error("Invalid Ed25519 trust authority");
          }
          const pem = createPublicKey({
            key: { kty: "OKP", crv: "Ed25519", x: raw.toString("base64url") }, format: "jwk",
          }).export({ type: "spki", format: "pem" });
          writeFileSync(process.env.PUBLIC_KEY_FILE, pem, { mode: 0o600, flag: "wx" });
          NODE
          printf 'REFRESH_WORK=%s\nSOURCE_BUNDLE=%s\nBASELINE_BUNDLE=%s\nREFRESH_INPUT=%s\nREFRESH_OUTPUT=%s\nVERIFY_BUNDLE=%s\nPUBLIC_KEY_FILE=%s\nSOURCE_ARCHIVE_SHA256=%s\nSOURCE_ARCHIVE_SIZE=%s\n' \
            "$work" "$source" "$baseline" "$refresh_input" "$work/output" "$work/verify" \
            "$work/release-public.pem" "$source_archive_sha256" "$source_archive_size" >> "$GITHUB_ENV"

      - name: Authenticate prerelease cross-track predecessor
        if: ${{ env.REFRESH_TRACK == 'prerelease' }}
        shell: bash
        run: |
          set -euo pipefail
          baseline_catalog="$BASELINE_BUNDLE/org.simulator.open-design-0.14.5-catalog-v2.json"
          baseline_state=$(node -e '
            const fs = require("node:fs");
            const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const issuedAtMs = Date.parse(value.issuedAt);
            if (!Number.isSafeInteger(value.sequence) || value.sequence < 1 ||
                !Number.isFinite(issuedAtMs) || new Date(issuedAtMs).toISOString() !== value.issuedAt) process.exit(1);
            process.stdout.write(JSON.stringify({ sequence: value.sequence, issuedAt: value.issuedAt, verificationTime: issuedAtMs + 1000 }));
          ' "$baseline_catalog")
          node modules/open-design/package/production-cli.mjs \
            --module-version 0.14.5 --verify --bundle-root "$BASELINE_BUNDLE" \
            --release-tag open-design-v0.14.5 --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" --key-active-until "$KEY_ACTIVE_UNTIL" \
            --public-key-file "$PUBLIC_KEY_FILE" --previous-sequence 0 \
            --verification-time "$(jq -r .verificationTime <<<"$baseline_state")" \
            > "$RUNNER_TEMP/open-design-refresh-baseline-verify.json"
          jq -e --argjson sequence "$(jq -r .sequence <<<"$baseline_state")" --arg issuedAt "$(jq -r .issuedAt <<<"$baseline_state")" '
            .ok == true and .version == "0.14.5" and
            .catalogState.highestSequence == $sequence and .catalogState.latestIssuedAt == $issuedAt
          ' "$RUNNER_TEMP/open-design-refresh-baseline-verify.json" >/dev/null
          printf 'BASELINE_SEQUENCE=%s\nBASELINE_ISSUED_AT=%s\n' \
            "$(jq -r .sequence <<<"$baseline_state")" "$(jq -r .issuedAt <<<"$baseline_state")" >> "$GITHUB_ENV"

      - name: Derive monotonic refresh state and bounded window
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from "node:fs";
          const catalog = JSON.parse(readFileSync(`${process.env.SOURCE_BUNDLE}/${process.env.CATALOG_ASSET}`, "utf8"));
          if (catalog.schemaVersion !== 2 || !Number.isSafeInteger(catalog.sequence) || catalog.sequence < 1 || catalog.sequence >= Number.MAX_SAFE_INTEGER) throw new Error("Invalid prior catalog state");
          const previousIssuedAtMs = Date.parse(catalog.issuedAt);
          if (!Number.isFinite(previousIssuedAtMs) || new Date(previousIssuedAtMs).toISOString() !== catalog.issuedAt) throw new Error("Invalid prior issuedAt");
          let highWaterSequence = catalog.sequence;
          let highWaterIssuedAtMs = previousIssuedAtMs;
          if (process.env.REFRESH_TRACK === "prerelease") {
            const baselineSequence = Number(process.env.BASELINE_SEQUENCE);
            const baselineIssuedAtMs = Date.parse(process.env.BASELINE_ISSUED_AT ?? "");
            if (!Number.isSafeInteger(baselineSequence) || baselineSequence < 1 ||
                !Number.isFinite(baselineIssuedAtMs) ||
                new Date(baselineIssuedAtMs).toISOString() !== process.env.BASELINE_ISSUED_AT) {
              throw new Error("Invalid authenticated stable cross-track state");
            }
            highWaterSequence = Math.max(highWaterSequence, baselineSequence);
            highWaterIssuedAtMs = Math.max(highWaterIssuedAtMs, baselineIssuedAtMs);
          } else if (process.env.REFRESH_TRACK !== "stable") {
            throw new Error("Invalid refresh track");
          }
          if (highWaterSequence >= Number.MAX_SAFE_INTEGER) throw new Error("Catalog sequence exhausted");
          const issuedAtMs = Math.max(Date.now(), highWaterIssuedAtMs + 1000);
          const issuedAt = new Date(issuedAtMs).toISOString();
          const expiresAt = new Date(issuedAtMs + 20 * 60 * 60 * 1000).toISOString();
          appendFileSync(process.env.GITHUB_ENV,
            `PREVIOUS_SEQUENCE=${catalog.sequence}\nPREVIOUS_ISSUED_AT=${catalog.issuedAt}\n` +
            `SOURCE_VERIFICATION_TIME_MS=${previousIssuedAtMs + 1000}\n` +
            `VERIFY_PREVIOUS_SEQUENCE=${highWaterSequence}\n` +
            `VERIFY_PREVIOUS_ISSUED_AT=${new Date(highWaterIssuedAtMs).toISOString()}\n` +
            `CATALOG_SEQUENCE=${highWaterSequence + 1}\nCATALOG_ISSUED_AT=${issuedAt}\n` +
            `CATALOG_EXPIRES_AT=${expiresAt}\nVERIFICATION_TIME_MS=${issuedAtMs + 1000}\n`);
          NODE

      - name: Authenticate source, dry-run, and create signed refresh assets
        shell: bash
        env:
          OPEN_DESIGN_RELEASE_PRIVATE_KEY: ${{ secrets.OPEN_DESIGN_RELEASE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          set +x
          umask 077
          test -n "$OPEN_DESIGN_RELEASE_PRIVATE_KEY"
          test -s "$PUBLIC_KEY_FILE"
          PRIVATE_DERIVED_PUBLIC="$REFRESH_WORK/private-derived-public.pem" node --input-type=module <<'NODE'
          import { createPrivateKey, createPublicKey } from "node:crypto";
          import { writeFileSync } from "node:fs";
          const privateKey = createPrivateKey({ key: process.env.OPEN_DESIGN_RELEASE_PRIVATE_KEY, format: "pem" });
          const publicKey = createPublicKey(privateKey).export({ format: "pem", type: "spki" });
          writeFileSync(process.env.PRIVATE_DERIVED_PUBLIC, publicKey, { mode: 0o600, flag: "wx" });
          NODE
          cmp "$PUBLIC_KEY_FILE" "$REFRESH_WORK/private-derived-public.pem"

          if [[ "$CONFIG_REQUIRED" = false ]]; then
            # A prerelease deliberately has no public official-channel asset.
            # Authenticate its signed release and strict metadata with the
            # externally derived key before creating a private, one-run config.
            node --input-type=module <<'NODE'
          import { createHash, createPublicKey } from "node:crypto";
          import { chmodSync, constants, copyFileSync, mkdirSync, readFileSync, readdirSync, statSync, writeFileSync } from "node:fs";
          import { join } from "node:path";
          import { encodeCanonicalCatalog, verifyModuleReleaseCatalog } from "@simulator/module-release-trust";

          const fail = (message) => { throw new Error(message); };
          const exactKeys = (value, expected, label) => {
            if (value === null || typeof value !== "object" || Array.isArray(value)) fail(`${label} must be an object`);
            const actual = Object.keys(value).sort();
            const wanted = [...expected].sort();
            if (actual.length !== wanted.length || actual.some((key, index) => key !== wanted[index])) fail(`${label} fields differ`);
          };
          const exactArray = (value, expected, label) => {
            if (!Array.isArray(value) || value.length !== expected.length || value.some((item, index) => item !== expected[index])) fail(`${label} differs`);
          };
          const canonicalJson = (path, maximum, label) => {
            const bytes = readFileSync(path);
            if (bytes.length === 0 || bytes.length > maximum) fail(`${label} size is invalid`);
            let value;
            try { value = JSON.parse(new TextDecoder("utf-8", { fatal: true }).decode(bytes)); } catch { fail(`${label} JSON is invalid`); }
            if (!Buffer.from(encodeCanonicalCatalog(value)).equals(bytes)) fail(`${label} is not canonical JSON`);
            return { bytes, value };
          };
          const canonicalBase64 = (value, size, label) => {
            if (typeof value !== "string") fail(`${label} is not base64`);
            const bytes = Buffer.from(value, "base64");
            if (bytes.length !== size || bytes.toString("base64") !== value) fail(`${label} is not canonical base64`);
            return bytes;
          };

          const base = `https://github.com/${process.env.RELEASE_OWNER}/${process.env.RELEASE_REPOSITORY}/releases/download/${process.env.RELEASE_TAG}/`;
          const catalogPath = join(process.env.SOURCE_BUNDLE, process.env.CATALOG_ASSET);
          const envelopePath = join(process.env.SOURCE_BUNDLE, process.env.ENVELOPE_ASSET);
          const metadataPath = join(process.env.SOURCE_BUNDLE, process.env.METADATA_ASSET);
          const archivePath = join(process.env.SOURCE_BUNDLE, process.env.ARCHIVE_ASSET);
          const catalogSource = canonicalJson(catalogPath, 8 * 1024 * 1024, "raw catalog");
          const envelopeSource = canonicalJson(envelopePath, 8 * 1024 * 1024, "catalog envelope");
          exactKeys(envelopeSource.value, ["schemaVersion", "keyId", "catalogBytes", "signature"], "catalog envelope");
          if (envelopeSource.value.schemaVersion !== 1 || envelopeSource.value.keyId !== process.env.KEY_ID) fail("catalog envelope authority differs");
          const envelopeCatalogBytes = canonicalBase64(envelopeSource.value.catalogBytes, catalogSource.bytes.length, "envelope catalogBytes");
          const signature = canonicalBase64(envelopeSource.value.signature, 64, "envelope signature");
          if (!envelopeCatalogBytes.equals(catalogSource.bytes)) fail("envelope differs from raw catalog");

          const publicJwk = createPublicKey(readFileSync(process.env.PUBLIC_KEY_FILE)).export({ format: "jwk" });
          if (publicJwk.kty !== "OKP" || publicJwk.crv !== "Ed25519" || typeof publicJwk.x !== "string") fail("derived public key is not Ed25519");
          const publicKey = Buffer.from(publicJwk.x, "base64url");
          if (publicKey.length !== 32) fail("derived public key length is invalid");
          const publicKeyBase64 = publicKey.toString("base64");
          const untrustedIssuedAt = catalogSource.value?.issuedAt;
          const historicalTime = Date.parse(untrustedIssuedAt);
          if (!Number.isSafeInteger(historicalTime) || new Date(historicalTime).toISOString() !== untrustedIssuedAt) fail("catalog issuedAt is invalid");
          const verified = verifyModuleReleaseCatalog({
            schemaVersion: 1,
            keyId: envelopeSource.value.keyId,
            catalogBytes: Uint8Array.from(envelopeCatalogBytes),
            signature: Uint8Array.from(signature),
          }, {
            trustedKeys: [{
              keyId: process.env.KEY_ID,
              publicKey: Uint8Array.from(publicKey),
              activeFrom: process.env.KEY_ACTIVE_FROM,
              activeUntil: process.env.KEY_ACTIVE_UNTIL,
            }],
            state: { highestSequence: 0 },
            now: historicalTime,
          });
          if (!verified.ok) fail(`catalog signature verification failed: ${verified.diagnostics.map((item) => item.code).join(",")}`);
          if (verified.keyId !== process.env.KEY_ID || verified.catalog.schemaVersion !== 2 || verified.catalog.releases.length !== 1) fail("signed catalog identity differs");
          if (verified.catalog.sequence.toString() !== process.env.PREVIOUS_SEQUENCE || verified.catalog.issuedAt !== process.env.PREVIOUS_ISSUED_AT) fail("signed catalog state differs");

          const release = verified.catalog.releases[0];
          const artifact = release?.manifest?.artifacts?.[0];
          const expectedManifest = {
            schemaVersion: 1,
            id: "org.simulator.open-design",
            version: process.env.MODULE_VERSION,
            artifacts: [{
              platform: "darwin-arm64",
              entrypoint: "runtime/open-design-launcher",
              auxiliaryExecutables: [
                "runtime/node/bin/node",
                "runtime/daemon/node_modules/node-pty/prebuilds/darwin-arm64/spawn-helper",
              ],
              url: `${base}${process.env.ARCHIVE_ASSET}`,
              sha256: artifact?.sha256,
            }],
            capabilities: ["host-agent.use", "workspace.read", "workspace.write"],
          };
          if (!release || !artifact || release.manifest.artifacts.length !== 1
            || !Buffer.from(encodeCanonicalCatalog(release.manifest)).equals(Buffer.from(encodeCanonicalCatalog(expectedManifest)))) fail("signed manifest differs");
          if (release.hostVersionRange !== process.env.EXPECTED_HOST_VERSION_RANGE) fail("signed host range differs");
          if (release.artifactSizes.length !== 1 || release.artifactSizes[0]?.platform !== "darwin-arm64") fail("signed archive size metadata differs");
          if (release.artifactInstallMetadata.length !== 1 || release.artifactInstallMetadata[0]?.platform !== "darwin-arm64"
            || !/^[0-9a-f]{64}$/.test(release.artifactInstallMetadata[0]?.extractedManifestSha256 ?? "")) fail("signed tree metadata differs");
          const archive = readFileSync(archivePath);
          const archiveInfo = statSync(archivePath);
          const archiveSha256 = createHash("sha256").update(archive).digest("hex");
          if (!archiveInfo.isFile() || archiveInfo.size.toString() !== process.env.SOURCE_ARCHIVE_SIZE
            || archiveInfo.size !== release.artifactSizes[0].size || archiveSha256 !== process.env.SOURCE_ARCHIVE_SHA256
            || archiveSha256 !== artifact.sha256) fail("immutable archive differs");

          const metadataSource = canonicalJson(metadataPath, 256 * 1024, "release metadata");
          const metadata = metadataSource.value;
          exactKeys(metadata, ["schemaVersion", "distribution", "module", "githubRelease", "catalog", "archive", "hostVersionRange", "hostIntegration", "catalogRefreshPolicy", "trustedKey", "provenance"], "release metadata");
          exactKeys(metadata.distribution, ["class", "nonPromotable"], "distribution metadata");
          exactKeys(metadata.module, ["id", "version", "platform"], "module metadata");
          exactKeys(metadata.githubRelease, ["owner", "repository", "tag"], "GitHub metadata");
          exactKeys(metadata.catalog, ["path", "canonicalCatalogPath", "url", "schemaVersion", "sequence", "issuedAt", "expiresAt", "sha256", "size"], "catalog metadata");
          exactKeys(metadata.archive, ["path", "url", "sha256", "size", "extractedManifestSha256"], "archive metadata");
          exactKeys(metadata.hostIntegration, ["generatedConfig", "sourceCopyTarget", "packagedRuntimeTarget", "copyPipeline"], "host integration metadata");
          exactKeys(metadata.catalogRefreshPolicy, ["catalogTtlMaximumHours", "ciRefreshCadenceMaximumHours", "releaseTagMustRemain", "archiveAssetImmutable", "monotonicFields", "replaceReleaseAssets"], "refresh policy metadata");
          exactKeys(metadata.trustedKey, ["keyId", "publicKey", "activeFrom", "activeUntil"], "trusted key metadata");
          exactKeys(metadata.provenance, ["signing", "runtimeAuthority", "nodeRuntime", "referenceMapping"], "provenance metadata");
          exactKeys(metadata.provenance.nodeRuntime, ["version", "executableSha256", "licenseSha256"], "Node provenance metadata");
          if (metadata.schemaVersion !== 1 || metadata.distribution.class !== "public" || metadata.distribution.nonPromotable !== false
            || metadata.module.id !== "org.simulator.open-design" || metadata.module.version !== process.env.MODULE_VERSION || metadata.module.platform !== "darwin-arm64"
            || metadata.githubRelease.owner !== process.env.RELEASE_OWNER || metadata.githubRelease.repository !== process.env.RELEASE_REPOSITORY || metadata.githubRelease.tag !== process.env.RELEASE_TAG) fail("release metadata identity differs");
          const catalogSha256 = createHash("sha256").update(catalogSource.bytes).digest("hex");
          if (metadata.catalog.path !== process.env.ENVELOPE_ASSET || metadata.catalog.canonicalCatalogPath !== process.env.CATALOG_ASSET
            || metadata.catalog.url !== `${base}${process.env.ENVELOPE_ASSET}` || metadata.catalog.schemaVersion !== 2
            || metadata.catalog.sequence !== verified.catalog.sequence || metadata.catalog.issuedAt !== verified.catalog.issuedAt
            || metadata.catalog.expiresAt !== verified.catalog.expiresAt || metadata.catalog.sha256 !== catalogSha256
            || metadata.catalog.size !== catalogSource.bytes.length) fail("release catalog metadata differs");
          if (metadata.archive.path !== process.env.ARCHIVE_ASSET || metadata.archive.url !== artifact.url
            || metadata.archive.sha256 !== archiveSha256 || metadata.archive.size !== archiveInfo.size
            || metadata.archive.extractedManifestSha256 !== release.artifactInstallMetadata[0].extractedManifestSha256
            || metadata.hostVersionRange !== release.hostVersionRange) fail("release archive or host metadata differs");
          if (metadata.hostIntegration.generatedConfig !== process.env.CONFIG_ASSET
            || metadata.hostIntegration.sourceCopyTarget !== "apps/electron/resources/open-design-official-channel.json"
            || metadata.hostIntegration.packagedRuntimeTarget !== "Contents/Resources/app/dist/resources/open-design-official-channel.json"
            || metadata.hostIntegration.copyPipeline !== "apps/electron/scripts/copy-assets.ts") fail("host integration metadata differs");
          exactArray(metadata.catalogRefreshPolicy.monotonicFields, ["sequence", "issuedAt"], "refresh monotonic fields");
          exactArray(metadata.catalogRefreshPolicy.replaceReleaseAssets, [process.env.CATALOG_ASSET, process.env.ENVELOPE_ASSET, process.env.METADATA_ASSET], "refresh asset policy");
          if (metadata.catalogRefreshPolicy.catalogTtlMaximumHours !== 24 || metadata.catalogRefreshPolicy.ciRefreshCadenceMaximumHours !== 12
            || metadata.catalogRefreshPolicy.releaseTagMustRemain !== process.env.RELEASE_TAG || metadata.catalogRefreshPolicy.archiveAssetImmutable !== true) fail("refresh policy metadata differs");
          if (metadata.trustedKey.keyId !== process.env.KEY_ID || metadata.trustedKey.publicKey !== publicKeyBase64
            || metadata.trustedKey.activeFrom !== process.env.KEY_ACTIVE_FROM || metadata.trustedKey.activeUntil !== process.env.KEY_ACTIVE_UNTIL) fail("release key metadata differs");
          exactArray(metadata.provenance.referenceMapping, [
            "Proma package-open-design-host-app: dry-run, deterministic archive, catalog-bound size/hash",
            "Proma sign-host-app-catalog: separate Ed25519 sign/verify and tamper rejection",
            "Proma inspect-host-app-release-readiness: exact-tag GitHub Release URLs",
          ], "reference provenance");
          if (metadata.provenance.signing !== "external-ed25519-private-key" || metadata.provenance.runtimeAuthority !== "compile-time-official-channel-config"
            || metadata.provenance.nodeRuntime.version !== "24.18.0"
            || metadata.provenance.nodeRuntime.executableSha256 !== "ee6fb0e015284d83a91e8ec5213f43a157f8a392b58555301682892ba928c04a"
            || metadata.provenance.nodeRuntime.licenseSha256 !== "148eacf7863ef4329224a29398623077200a27194aa075569faf4a0a85566ca5") fail("release provenance metadata differs");

          mkdirSync(process.env.REFRESH_INPUT, { mode: 0o700 });
          for (const asset of [process.env.ARCHIVE_ASSET, process.env.CATALOG_ASSET, process.env.ENVELOPE_ASSET, process.env.METADATA_ASSET]) {
            copyFileSync(join(process.env.SOURCE_BUNDLE, asset), join(process.env.REFRESH_INPUT, asset), constants.COPYFILE_EXCL);
            chmodSync(join(process.env.REFRESH_INPUT, asset), 0o600);
          }
          const official = {
            schemaVersion: 1,
            moduleId: "org.simulator.open-design",
            version: process.env.MODULE_VERSION,
            platform: "darwin-arm64",
            catalogUrl: `${base}${process.env.ENVELOPE_ASSET}`,
            githubRelease: { owner: process.env.RELEASE_OWNER, repository: process.env.RELEASE_REPOSITORY, tag: process.env.RELEASE_TAG },
            trustedKeys: [{
              keyId: process.env.KEY_ID,
              publicKey: publicKeyBase64,
              activeFrom: process.env.KEY_ACTIVE_FROM,
              activeUntil: process.env.KEY_ACTIVE_UNTIL,
            }],
          };
          writeFileSync(join(process.env.REFRESH_INPUT, process.env.CONFIG_ASSET), encodeCanonicalCatalog(official), { mode: 0o600, flag: "wx" });
          const actualPrivateFiles = readdirSync(process.env.REFRESH_INPUT).sort();
          const expectedPrivateFiles = [process.env.ARCHIVE_ASSET, process.env.CATALOG_ASSET, process.env.ENVELOPE_ASSET, process.env.CONFIG_ASSET, process.env.METADATA_ASSET].sort();
          if (actualPrivateFiles.length !== expectedPrivateFiles.length || actualPrivateFiles.some((name, index) => name !== expectedPrivateFiles[index])) fail("private verification bundle fields differ");
          NODE
          else
            test "$REFRESH_INPUT" = "$SOURCE_BUNDLE"
          fi

          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --verify \
            --bundle-root "$REFRESH_INPUT" \
            --release-tag "$RELEASE_TAG" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --public-key-file "$PUBLIC_KEY_FILE" \
            --previous-sequence 0 \
            --verification-time "$SOURCE_VERIFICATION_TIME_MS" > "$RUNNER_TEMP/open-design-refresh-source-verify.json"
          jq -e --arg version "$MODULE_VERSION" --arg archiveSha "$SOURCE_ARCHIVE_SHA256" --argjson sequence "$PREVIOUS_SEQUENCE" --arg issuedAt "$PREVIOUS_ISSUED_AT" '
            .ok == true and .version == $version and .archiveSha256 == $archiveSha and
            (.extractedManifestSha256 | test("^[0-9a-f]{64}$")) and
            .catalogState.highestSequence == $sequence and .catalogState.latestIssuedAt == $issuedAt
          ' "$RUNNER_TEMP/open-design-refresh-source-verify.json" >/dev/null

          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --refresh \
            --dry-run \
            --bundle-root "$REFRESH_INPUT" \
            --release-tag "$RELEASE_TAG" \
            --catalog-sequence "$CATALOG_SEQUENCE" \
            --catalog-issued-at "$CATALOG_ISSUED_AT" \
            --catalog-expires-at "$CATALOG_EXPIRES_AT" \
            --previous-sequence "$PREVIOUS_SEQUENCE" \
            --previous-issued-at "$PREVIOUS_ISSUED_AT" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --verification-time "$VERIFICATION_TIME_MS" > "$RUNNER_TEMP/open-design-refresh-dry-run.json"
          jq -e \
            --arg version "$MODULE_VERSION" \
            --arg releaseTag "$RELEASE_TAG" \
            --argjson previousSequence "$PREVIOUS_SEQUENCE" \
            --arg previousIssuedAt "$PREVIOUS_ISSUED_AT" \
            --argjson sequence "$CATALOG_SEQUENCE" \
            --arg issuedAt "$CATALOG_ISSUED_AT" \
            --arg expiresAt "$CATALOG_EXPIRES_AT" \
            --arg catalog "$CATALOG_ASSET" \
            --arg envelope "$ENVELOPE_ASSET" \
            --arg metadata "$METADATA_ASSET" '
              .mode == "refresh-dry-run" and .writes == [] and
              .moduleId == "org.simulator.open-design" and .version == $version and
              .platform == "darwin-arm64" and .releaseTag == $releaseTag and
              .previousCatalog.sequence == $previousSequence and
              .previousCatalog.issuedAt == $previousIssuedAt and
              .nextCatalog.sequence == $sequence and .nextCatalog.issuedAt == $issuedAt and
              .nextCatalog.expiresAt == $expiresAt and
              .plannedFiles == [$catalog, $envelope, $metadata] and
              .immutableArchiveVerified == true and .verifiedWithModuleInstaller == true and
              .signingRequired == true
            ' "$RUNNER_TEMP/open-design-refresh-dry-run.json" >/dev/null

          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --refresh \
            --bundle-root "$REFRESH_INPUT" \
            --output "$REFRESH_OUTPUT" \
            --release-tag "$RELEASE_TAG" \
            --catalog-sequence "$CATALOG_SEQUENCE" \
            --catalog-issued-at "$CATALOG_ISSUED_AT" \
            --catalog-expires-at "$CATALOG_EXPIRES_AT" \
            --previous-sequence "$PREVIOUS_SEQUENCE" \
            --previous-issued-at "$PREVIOUS_ISSUED_AT" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --verification-time "$VERIFICATION_TIME_MS" \
            --private-key-env OPEN_DESIGN_RELEASE_PRIVATE_KEY > "$RUNNER_TEMP/open-design-refresh-build.json"

      - name: Reconstruct and verify complete refreshed bundle
        shell: bash
        run: |
          set -euo pipefail
          jq -e --arg archiveSha "$SOURCE_ARCHIVE_SHA256" '
            .immutableArchiveSha256 == $archiveSha and .verifiedWithModuleInstaller == true
          ' "$RUNNER_TEMP/open-design-refresh-build.json" >/dev/null
          expected=$(printf '%s\n' "$CATALOG_ASSET" "$ENVELOPE_ASSET" "$METADATA_ASSET" | LC_ALL=C sort)
          actual=$(find "$REFRESH_OUTPUT" -maxdepth 1 -type f -exec basename {} \; | LC_ALL=C sort)
          test "$actual" = "$expected"
          mkdir -m 700 "$VERIFY_BUNDLE"
          cp "$SOURCE_BUNDLE/$ARCHIVE_ASSET" "$VERIFY_BUNDLE/$ARCHIVE_ASSET"
          cp "$REFRESH_INPUT/$CONFIG_ASSET" "$VERIFY_BUNDLE/$CONFIG_ASSET"
          cp "$REFRESH_OUTPUT/$CATALOG_ASSET" "$VERIFY_BUNDLE/$CATALOG_ASSET"
          cp "$REFRESH_OUTPUT/$ENVELOPE_ASSET" "$VERIFY_BUNDLE/$ENVELOPE_ASSET"
          cp "$REFRESH_OUTPUT/$METADATA_ASSET" "$VERIFY_BUNDLE/$METADATA_ASSET"
          chmod 600 "$VERIFY_BUNDLE"/*
          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --verify \
            --bundle-root "$VERIFY_BUNDLE" \
            --release-tag "$RELEASE_TAG" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --public-key-file "$PUBLIC_KEY_FILE" \
            --previous-sequence "$VERIFY_PREVIOUS_SEQUENCE" \
            --previous-issued-at "$VERIFY_PREVIOUS_ISSUED_AT" \
            --verification-time "$VERIFICATION_TIME_MS" > "$RUNNER_TEMP/open-design-refresh-verify.json"
          test "$(shasum -a 256 "$VERIFY_BUNDLE/$ARCHIVE_ASSET" | awk '{print $1}')" = "$SOURCE_ARCHIVE_SHA256"
          jq -e --arg version "$MODULE_VERSION" --arg archiveSha "$SOURCE_ARCHIVE_SHA256" --argjson sequence "$CATALOG_SEQUENCE" --arg issuedAt "$CATALOG_ISSUED_AT" '
            .ok == true and .version == $version and .archiveSha256 == $archiveSha and
            (.extractedManifestSha256 | test("^[0-9a-f]{64}$")) and
            .catalogState.highestSequence == $sequence and .catalogState.latestIssuedAt == $issuedAt
          ' "$RUNNER_TEMP/open-design-refresh-verify.json" >/dev/null

      - name: Replace only refresh assets through a draft rollback transaction
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          umask 077
          canonical=("$CATALOG_ASSET" "$ENVELOPE_ASSET" "$METADATA_ASSET")
          public_assets=("$ARCHIVE_ASSET" "$CATALOG_ASSET" "$ENVELOPE_ASSET" "$METADATA_ASSET")
          [[ "$CONFIG_REQUIRED" = false ]] || public_assets+=("$CONFIG_ASSET")
          expected_public=$(printf '%s\n' "${public_assets[@]}" | LC_ALL=C sort)
          suffix="refresh-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          stage="$REFRESH_WORK/stage"
          candidate_names=()
          candidate_ids=()
          old_ids=()
          old_renamed=(0 0 0)
          hide_requested=0
          hidden=0
          transaction_verified=0
          success=0
          mkdir -m 700 "$stage"

          release_state=$(gh release view "$RELEASE_TAG" \
            --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,assets)
          test "$(jq -r .tagName <<<"$release_state")" = "$RELEASE_TAG"
          test "$(jq -r .isDraft <<<"$release_state")" = false
          test "$(jq -r .isPrerelease <<<"$release_state")" = "$EXPECTED_PRERELEASE"
          test "$(jq -r '.assets[].name' <<<"$release_state" | LC_ALL=C sort)" = "$expected_public"
          release_id=$(gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/tags/$RELEASE_TAG" --jq .id)
          [[ "$release_id" =~ ^[1-9][0-9]*$ ]]

          asset_id() {
            local name=$1
            gh api "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/$release_id" \
              --jq ".assets[] | select(.name == \"$name\") | .id"
          }
          rollback() {
            local status=$?
            set +e
            if [[ "$success" = 0 ]]; then
              if [[ "$hidden" = 0 && "$hide_requested" = 1 ]]; then
                # The draft mutation may have reached GitHub even when its
                # response was lost. Re-read the authoritative remote state;
                # only an unchanged exact draft is safe to republish.
                uncertain_state=$(gh release view "$RELEASE_TAG" \
                  --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
                  --json isDraft,isPrerelease,assets 2>/dev/null)
                uncertain_assets=$(jq -r '.assets[].name' <<<"$uncertain_state" 2>/dev/null | LC_ALL=C sort)
                if [[ -n "$uncertain_state" \
                  && "$uncertain_assets" = "$expected_public" \
                  && "$(jq -r .isDraft <<<"$uncertain_state")" = true \
                  && "$(jq -r .isPrerelease <<<"$uncertain_state")" = "$EXPECTED_PRERELEASE" ]]; then
                  gh release edit "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --draft=false >/dev/null 2>&1
                  recovered_state=$(gh release view "$RELEASE_TAG" \
                    --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
                    --json isDraft,isPrerelease,assets 2>/dev/null)
                  recovered_assets=$(jq -r '.assets[].name' <<<"$recovered_state" 2>/dev/null | LC_ALL=C sort)
                  if [[ -z "$recovered_state" \
                    || "$recovered_assets" != "$expected_public" \
                    || "$(jq -r .isDraft <<<"$recovered_state")" != false \
                    || "$(jq -r .isPrerelease <<<"$recovered_state")" != "$EXPECTED_PRERELEASE" ]]; then
                    echo "Draft transition response was lost and automatic recovery could not be verified; inspect the Release manually" >&2
                  fi
                elif [[ -n "$uncertain_state" \
                  && "$uncertain_assets" = "$expected_public" \
                  && "$(jq -r .isDraft <<<"$uncertain_state")" = false \
                  && "$(jq -r .isPrerelease <<<"$uncertain_state")" = "$EXPECTED_PRERELEASE" ]]; then
                  echo "Draft transition failed before changing the exact public Release" >&2
                else
                  echo "Draft transition response was lost and remote state is not safely recoverable; inspect the Release manually" >&2
                fi
              elif [[ "$hidden" = 1 && "$transaction_verified" = 0 ]]; then
                for i in 2 1 0; do
                  [[ -n "${candidate_ids[$i]:-}" ]] && gh api -X DELETE "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/assets/${candidate_ids[$i]}" >/dev/null 2>&1
                  if [[ "${old_renamed[$i]:-0}" = 1 ]]; then
                    gh api -X PATCH "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/assets/${old_ids[$i]}" -f "name=${canonical[$i]}" >/dev/null 2>&1
                  fi
                done
                for name in "${candidate_names[@]:-}"; do
                  remaining_id=$(asset_id "$name" 2>/dev/null || true)
                  [[ -z "$remaining_id" ]] || gh api -X DELETE "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/assets/$remaining_id" >/dev/null 2>&1
                done
                restored_state=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --json isDraft,isPrerelease,assets)
                restored=$(jq -r '.assets[].name' <<<"$restored_state" | LC_ALL=C sort)
                if [[ "$restored" = "$expected_public" \
                  && "$(jq -r .isDraft <<<"$restored_state")" = true \
                  && "$(jq -r .isPrerelease <<<"$restored_state")" = "$EXPECTED_PRERELEASE" ]]; then
                  gh release edit "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --draft=false >/dev/null 2>&1
                  republished_state=$(gh release view "$RELEASE_TAG" \
                    --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
                    --json isDraft,isPrerelease,assets 2>/dev/null)
                  republished_assets=$(jq -r '.assets[].name' <<<"$republished_state" 2>/dev/null | LC_ALL=C sort)
                  if [[ -z "$republished_state" \
                    || "$republished_assets" != "$expected_public" \
                    || "$(jq -r .isDraft <<<"$republished_state")" != false \
                    || "$(jq -r .isPrerelease <<<"$republished_state")" != "$EXPECTED_PRERELEASE" ]]; then
                    echo "Rollback restored the old assets but republishing could not be verified; inspect the draft Release manually" >&2
                  fi
                else
                  echo "Rollback needs manual recovery; release remains draft" >&2
                fi
              elif [[ "$hidden" = 1 ]]; then
                verified_state=$(gh release view "$RELEASE_TAG" \
                  --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
                  --json isDraft,isPrerelease,assets 2>/dev/null)
                verified_assets=$(jq -r '.assets[].name' <<<"$verified_state" 2>/dev/null | LC_ALL=C sort)
                if [[ -n "$verified_state" \
                  && "$verified_assets" = "$expected_public" \
                  && "$(jq -r .isDraft <<<"$verified_state")" = false \
                  && "$(jq -r .isPrerelease <<<"$verified_state")" = "$EXPECTED_PRERELEASE" ]]; then
                  echo "Republish response was lost, but the exact verified Release is public" >&2
                else
                  gh release edit "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --draft=true >/dev/null 2>&1
                  recovery_state=$(gh release view "$RELEASE_TAG" \
                    --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" \
                    --json isDraft,isPrerelease,assets 2>/dev/null)
                  if [[ -n "$recovery_state" && "$(jq -r .isDraft <<<"$recovery_state")" = true ]]; then
                    echo "Verified replacement is hidden for manual recovery" >&2
                  else
                    echo "Verified replacement state could not be hidden or verified; inspect the Release immediately" >&2
                  fi
                fi
              fi
            fi
            exit "$status"
          }
          trap rollback EXIT

          for name in "${canonical[@]}"; do
            old_id=$(asset_id "$name")
            [[ "$old_id" =~ ^[1-9][0-9]*$ ]]
            old_ids+=("$old_id")
          done

          # Hide the Release before adding temporary assets. Therefore every
          # public RC state has exactly four assets; all expanded states are draft.
          hide_requested=1
          gh release edit "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --draft=true
          hidden=1
          draft_state=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --json isDraft,isPrerelease,assets)
          test "$(jq -r .isDraft <<<"$draft_state")" = true
          test "$(jq -r .isPrerelease <<<"$draft_state")" = "$EXPECTED_PRERELEASE"
          test "$(jq -r '.assets[].name' <<<"$draft_state" | LC_ALL=C sort)" = "$expected_public"
          preflight="$REFRESH_WORK/preflight-current"
          mkdir -m 700 "$preflight"
          for asset in "${public_assets[@]}"; do
            gh release download "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --pattern "$asset" --dir "$preflight"
            cmp "$SOURCE_BUNDLE/$asset" "$preflight/$asset"
          done
          test "$(find "$preflight" -maxdepth 1 -type f | wc -l | tr -d ' ')" = "$PUBLIC_ASSET_COUNT"

          for name in "${canonical[@]}"; do
            candidate="$name.candidate-$suffix"
            candidate_names+=("$candidate")
            cp "$REFRESH_OUTPUT/$name" "$stage/$candidate"
            gh release upload "$RELEASE_TAG" "$stage/$candidate" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY"
            candidate_id=$(asset_id "$candidate")
            [[ "$candidate_id" =~ ^[1-9][0-9]*$ ]]
            candidate_ids+=("$candidate_id")
          done
          for i in 0 1 2; do
            test -n "${candidate_ids[$i]}"
            test -n "${old_ids[$i]}"
          done
          candidate_remote="$REFRESH_WORK/candidate-verify"
          mkdir -m 700 "$candidate_remote"
          for name in "${candidate_names[@]}"; do
            gh release download "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --pattern "$name" --dir "$candidate_remote"
            cmp "$stage/$name" "$candidate_remote/$name"
          done

          for i in 0 1 2; do
            gh api -X PATCH "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/assets/${old_ids[$i]}" -f "name=${canonical[$i]}.backup-$suffix" >/dev/null
            old_renamed[$i]=1
            gh api -X PATCH "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/assets/${candidate_ids[$i]}" -f "name=${canonical[$i]}" >/dev/null
          done

          remote="$REFRESH_WORK/remote-verify"
          mkdir -m 700 "$remote"
          for asset in "${public_assets[@]}"; do
            gh release download "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --pattern "$asset" --dir "$remote"
            chmod 600 "$remote/$asset"
          done
          test "$(find "$remote" -maxdepth 1 -type f | wc -l | tr -d ' ')" = "$PUBLIC_ASSET_COUNT"
          cmp "$SOURCE_BUNDLE/$ARCHIVE_ASSET" "$remote/$ARCHIVE_ASSET"
          test "$(shasum -a 256 "$remote/$ARCHIVE_ASSET" | awk '{print $1}')" = "$SOURCE_ARCHIVE_SHA256"
          if [[ "$CONFIG_REQUIRED" = true ]]; then
            cmp "$SOURCE_BUNDLE/$CONFIG_ASSET" "$remote/$CONFIG_ASSET"
          else
            test ! -e "$remote/$CONFIG_ASSET"
            cp "$REFRESH_INPUT/$CONFIG_ASSET" "$remote/$CONFIG_ASSET"
            chmod 600 "$remote/$CONFIG_ASSET"
          fi
          node modules/open-design/package/production-cli.mjs \
            --module-version "$MODULE_VERSION" \
            --verify \
            --bundle-root "$remote" \
            --release-tag "$RELEASE_TAG" \
            --key-id "$KEY_ID" \
            --key-active-from "$KEY_ACTIVE_FROM" \
            --key-active-until "$KEY_ACTIVE_UNTIL" \
            --public-key-file "$PUBLIC_KEY_FILE" \
            --previous-sequence "$VERIFY_PREVIOUS_SEQUENCE" \
            --previous-issued-at "$VERIFY_PREVIOUS_ISSUED_AT" \
            --verification-time "$VERIFICATION_TIME_MS" > "$RUNNER_TEMP/open-design-refresh-remote-verify.json"
          jq -e --arg version "$MODULE_VERSION" --arg archiveSha "$SOURCE_ARCHIVE_SHA256" --argjson sequence "$CATALOG_SEQUENCE" --arg issuedAt "$CATALOG_ISSUED_AT" '
            .ok == true and .version == $version and .archiveSha256 == $archiveSha and
            (.extractedManifestSha256 | test("^[0-9a-f]{64}$")) and
            .catalogState.highestSequence == $sequence and .catalogState.latestIssuedAt == $issuedAt
          ' "$RUNNER_TEMP/open-design-refresh-remote-verify.json" >/dev/null
          transaction_verified=1

          for id in "${old_ids[@]}"; do
            for attempt in 1 2 3 4 5; do
              if gh api -X DELETE "repos/$RELEASE_OWNER/$RELEASE_REPOSITORY/releases/assets/$id" >/dev/null 2>&1; then
                break
              fi
              test "$attempt" -lt 5
              sleep "$attempt"
            done
          done
          final_draft_state=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --json isDraft,isPrerelease,assets)
          test "$(jq -r .isDraft <<<"$final_draft_state")" = true
          test "$(jq -r .isPrerelease <<<"$final_draft_state")" = "$EXPECTED_PRERELEASE"
          test "$(jq -r '.assets[].name' <<<"$final_draft_state" | LC_ALL=C sort)" = "$expected_public"
          gh release edit "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --draft=false
          published_state=$(gh release view "$RELEASE_TAG" --repo "$RELEASE_OWNER/$RELEASE_REPOSITORY" --json isDraft,isPrerelease,assets)
          test "$(jq -r .isDraft <<<"$published_state")" = false
          test "$(jq -r .isPrerelease <<<"$published_state")" = "$EXPECTED_PRERELEASE"
          test "$(jq -r '.assets[].name' <<<"$published_state" | LC_ALL=C sort)" = "$expected_public"
          hidden=0
          success=1
          trap - EXIT

      - name: Remove transient signing and release material
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -d "$RUNNER_TEMP/open-design-refresh" ]]; then
            chmod -R u+rwX "$RUNNER_TEMP/open-design-refresh"
          fi
          rm -rf "$RUNNER_TEMP/open-design-refresh" "$RUNNER_TEMP/open-design-refresh-"*.json
