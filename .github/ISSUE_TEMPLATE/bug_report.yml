name: Bug report
description: Report a reproducible problem in Simulator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Simulator. Search existing issues before filing a new report.

        **Do not disclose security vulnerabilities here.** Use [GitHub Private Vulnerability Reporting](https://github.com/Jiachi-Deng/Simulator/security/advisories/new) instead.

  - type: input
    id: version
    attributes:
      label: Simulator version or commit
      description: Provide the app version, release tag, or full commit SHA.
      placeholder: "v0.1.0 or 0123456789abcdef..."
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "macOS 15.5, Windows 11 24H2, or Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: install_method
    attributes:
      label: Installation method
      description: State whether this is a release build, local build, package-manager install, or another setup.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Relevant environment
      description: Include provider, model, workspace type, enabled integrations, and configuration relevant to the bug. Remove secrets and personal data.

  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Clearly describe the observed problem and its impact.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs and UI evidence
      description: Attach minimal logs, screenshots, or recordings. Redact tokens, credentials, private prompts, file paths, and personal data.

  - type: textarea
    id: regression
    attributes:
      label: Regression details
      description: Did this work before? If known, provide the last working version and first broken version.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Include workarounds, frequency, or links to related issues.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checklist
      options:
        - label: I searched for existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets, credentials, and sensitive personal or workspace data.
          required: true
        - label: This report does not disclose a security vulnerability.
          required: true
